<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- CHẶN ZOOM TUYỆT ĐỐI TRÊN MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tpig - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        mono: ['IBM Plex Mono', 'monospace'],
                    },
                    colors: {
                        brand: '#FCD535',
                        brandHover: '#f59e0b',
                        dark: '#0b0f19',
                        card: '#1e232e',
                        border: '#2d3442'
                    },
                    animation: {
                        'slide-down': 'slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* --- CẤU HÌNH CỐT LÕI & CHỐNG ZOOM --- */
        html, body {
            height: 100%; overflow: hidden; touch-action: pan-y;
            -webkit-text-size-adjust: 100%;
            background-color: #0b0f19;
        }
        
        /* BẮT BUỘC FONT-SIZE 16PX CHO INPUT ĐỂ CHỐNG ZOOM TRÊN IOS */
        input, select, textarea { font-size: 16px !important; appearance: none; -webkit-appearance: none; border-radius: 0; }
        button, a { touch-action: manipulation; outline: none; -webkit-tap-highlight-color: transparent; }

        /* NỀN ĐỘNG (AMBIENT GLOW) */
        .bg-animate {
            background: radial-gradient(circle at 50% 0%, #1a1f2e 0%, #0b0f19 85%);
            position: absolute; inset: 0; z-index: -1;
        }
        .orb {
            position: absolute; width: 250px; height: 250px; background: #FCD535;
            filter: blur(100px); opacity: 0.1; top: -50px; left: 50%; transform: translateX(-50%);
        }

        /* CARD STYLE - CỐ ĐỊNH PHẦN TRÊN */
        .glass-panel {
            background: #1e232e;
            border: 1px solid #2d3442;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-radius: 24px;
            width: 100%; max-width: 360px;
            position: relative; overflow: hidden;
            /* Transition height mượt mà để form không bị giật */
            transition: height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* INPUT STYLE - CHUẨN TPIG */
        .input-box { position: relative; margin-bottom: 14px; }
        .input-control {
            width: 100%; background: #0b0f19; border: 1px solid #2d3442;
            color: #fff; padding: 14px 14px 14px 44px; border-radius: 12px;
            transition: all 0.2s;
        }
        .input-control:focus {
            border-color: #FCD535; background: #13161f; outline: none; box-shadow: 0 0 0 1px #FCD535;
        }
        .input-control::placeholder { color: #6b7280; font-size: 14px; }
        
        .input-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: #6b7280; font-size: 16px; transition: 0.2s;
        }
        .input-control:focus ~ .input-icon { color: #FCD535; }

        /* SMOOTH TABS */
        .tab-wrapper {
            display: flex; position: relative; background: #0b0f19; border: 1px solid #2d3442;
            border-radius: 12px; padding: 4px; margin-bottom: 24px;
        }
        .tab-item {
            flex: 1; text-align: center; padding: 10px; font-size: 13px; font-weight: 700;
            color: #9ca3af; cursor: pointer; z-index: 10; transition: color 0.3s;
        }
        .tab-item.active { color: #111; }
        
        /* Sliding Pill Indicator */
        .tab-indicator {
            position: absolute; top: 4px; left: 4px; bottom: 4px; width: calc(50% - 4px);
            background: #FCD535; border-radius: 8px; transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 2px 10px rgba(252, 213, 53, 0.3); z-index: 1;
        }

        /* BUTTON */
        .btn-action {
            width: 100%; background: gradient-to-r from-[#FCD535] to-[#f59e0b];
            background: #FCD535; color: #111; font-weight: 900; padding: 14px; border-radius: 12px;
            font-size: 14px; text-transform: uppercase; margin-top: 8px; letter-spacing: 0.5px;
            box-shadow: 0 5px 15px rgba(252, 213, 53, 0.2); transition: all 0.1s;
        }
        .btn-action:active:not(:disabled) { transform: scale(0.97); }
        .btn-action:disabled { opacity: 0.7; cursor: not-allowed; }

        /* FORM SLIDING ANIMATION */
        .forms-container {
            position: relative;
            height: 290px; /* Chiều cao mặc định Đăng nhập */
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .auth-form {
            position: absolute; top: 0; left: 0; width: 100%;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0; transform: translateX(50px); pointer-events: none;
        }

        .auth-form.active {
            opacity: 1; transform: translateX(0); pointer-events: auto; z-index: 20;
        }
        
        .auth-form.slide-left { transform: translateX(-50px); opacity: 0; }
        .auth-form.slide-right { transform: translateX(50px); opacity: 0; }

        /* TOAST & LOADING */
        #toast-box {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9999; width: max-content; max-width: 90vw;
        }
        .toast-msg {
            background: #1e232e; border: 1px solid #2d3442;
            padding: 12px 16px; border-radius: 50px; display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes slideDown { from { opacity:0; transform:translateY(-30px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="flex justify-center items-start pt-[10vh]">

    <div class="bg-animate"></div>
    <div class="orb"></div>
    <div id="toast-box"></div>

    <!-- LOADING SCREEN -->
    <div id="loadingOverlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#0b0f19] transition-opacity duration-300">
        <div class="w-14 h-14 bg-gradient-to-br from-[#FCD535] to-[#f59e0b] rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(252,213,53,0.4)] mb-5 animate-bounce">
            <span class="text-black font-black text-2xl italic tracking-widest pl-1">T</span>
        </div>
        <div class="flex items-center gap-1.5 mb-6">
            <div class="w-2 h-2 bg-[#FCD535] rounded-full animate-ping" style="animation-delay: 0s;"></div>
            <div class="w-2 h-2 bg-[#FCD535] rounded-full animate-ping" style="animation-delay: 0.2s;"></div>
            <div class="w-2 h-2 bg-[#FCD535] rounded-full animate-ping" style="animation-delay: 0.4s;"></div>
        </div>
        <p id="loadingText" class="text-[#FCD535] font-bold text-[10px] uppercase tracking-widest font-mono">Đang tải dữ liệu...</p>
        
        <button onclick="window.forceLogout()" class="mt-10 px-5 py-2 border border-[#2d3442] rounded-full text-[10px] text-gray-500 hover:bg-[#1e232e] hover:text-white transition-colors font-bold uppercase tracking-wider">
            Khởi động lại
        </button>
    </div>

    <!-- MAIN INTERFACE -->
    <div class="p-4 w-full flex justify-center animate-slide-down">
        <div class="glass-panel p-6">
            
            <!-- HEADER / LOGO -->
            <div class="text-center mb-6">
                <div class="font-black text-3xl text-white tracking-widest italic flex items-center justify-center gap-1 mb-1 drop-shadow-md">
                    <span class="text-[#FCD535]">T</span>PIG
                </div>
                <h1 class="text-xs font-bold text-gray-500 tracking-widest uppercase">Portal Access</h1>
            </div>

            <!-- TABS -->
            <div class="tab-wrapper">
                <div class="tab-indicator" id="tabIndicator"></div>
                <div class="tab-item active" id="tabLoginBtn" onclick="window.switchTab('login')">ĐĂNG NHẬP</div>
                <div class="tab-item" id="tabRegBtn" onclick="window.switchTab('register')">ĐĂNG KÝ</div>
            </div>

            <!-- FORMS CONTAINER -->
            <div class="forms-container" id="formsWrapper">
                
                <!-- LOGIN FORM (Chiều cao ước tính ~290px) -->
                <form id="formLogin" class="auth-form active">
                    <div class="input-box">
                        <input type="text" id="loginUser" class="input-control" placeholder="Tên đăng nhập" required autocomplete="off" autocorrect="off" spellcheck="false">
                        <i class="fa-regular fa-user input-icon"></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="loginPass" class="input-control" placeholder="Mật khẩu" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                        <i class="fa-regular fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 cursor-pointer p-1 text-sm hover:text-white transition" onclick="window.togglePass('loginPass')"></i>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-3 mb-5">
                        <div class="col-span-2 relative">
                            <input type="text" id="loginCaptcha" class="input-control font-mono uppercase tracking-widest text-center" placeholder="MÃ XÁC NHẬN" required maxlength="4" style="padding-left:14px;">
                        </div>
                        <div class="bg-[#0b0f19] border border-[#2d3442] rounded-xl overflow-hidden cursor-pointer relative group" onclick="window.drawCaptcha('login')">
                            <canvas id="canvasLogin" width="100" height="50" class="w-full h-full opacity-80 group-hover:opacity-100 transition"></canvas>
                            <div class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition">
                                <i class="fa-solid fa-rotate-right text-white"></i>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="btnLogin" class="btn-action">
                        TRUY CẬP HỆ THỐNG <i class="fa-solid fa-arrow-right ml-1"></i>
                    </button>
                </form>

                <!-- REGISTER FORM (Chiều cao ước tính ~430px) -->
                <form id="formRegister" class="auth-form slide-right">
                    <div class="input-box">
                        <input type="text" id="regUser" class="input-control" placeholder="Tên đăng nhập viết liền" required autocomplete="off" autocorrect="off" spellcheck="false">
                        <i class="fa-solid fa-user-tag input-icon"></i>
                    </div>
                    <div class="input-box">
                        <input type="tel" id="regPhone" class="input-control" placeholder="Số điện thoại" required pattern="[0-9]*" inputmode="numeric">
                        <i class="fa-solid fa-phone input-icon"></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="regPass" class="input-control" placeholder="Mật khẩu (Tối thiểu 6 ký tự)" required minlength="6">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <i class="fa-regular fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 cursor-pointer p-1 text-sm hover:text-white transition" onclick="window.togglePass('regPass')"></i>
                    </div>
                    <div class="input-box">
                        <input type="text" id="regName" class="input-control" placeholder="Họ và tên hiển thị" required autocomplete="off">
                        <i class="fa-solid fa-id-card input-icon"></i>
                    </div>

                    <div class="grid grid-cols-3 gap-3 mb-5">
                        <div class="col-span-2 relative">
                            <input type="text" id="regCaptcha" class="input-control font-mono uppercase tracking-widest text-center" placeholder="MÃ XÁC NHẬN" required maxlength="4" style="padding-left:14px;">
                        </div>
                        <div class="bg-[#0b0f19] border border-[#2d3442] rounded-xl overflow-hidden cursor-pointer relative group" onclick="window.drawCaptcha('reg')">
                            <canvas id="canvasReg" width="100" height="50" class="w-full h-full opacity-80 group-hover:opacity-100 transition"></canvas>
                            <div class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition">
                                <i class="fa-solid fa-rotate-right text-white"></i>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="btnReg" class="btn-action">
                        ĐĂNG KÝ TÀI KHOẢN
                    </button>
                </form>

            </div>

            <div class="text-center mt-5">
                <p class="text-[9px] text-[#4b5563] font-mono tracking-widest">SECURED BY FIREBASE &copy; 2024</p>
            </div>
        </div>
    </div>

    <!-- SCRIPT LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CHẶN ZOOM
        document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
        document.addEventListener('dblclick', function(e) { e.preventDefault(); });
        
        // Ngăn cuộn tự động gây lag khi bấm input trên iOS
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                setTimeout(() => { document.body.scrollTop = 0; }, 50);
            });
        });

        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAyYO8ZhxVvOImOZveUJULkK8tdcSxo7pU",
            authDomain: "btccoinbig.firebaseapp.com",
            projectId: "btccoinbig",
            storageBucket: "btccoinbig.firebasestorage.app",
            messagingSenderId: "116892525933",
            appId: "1:116892525933:web:04b0da25f3f933ce162664",
            measurementId: "G-7Q1GBFNQ37"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const EMAIL_PREFIX = "@tpig.com"; // Đã cập nhật hậu tố email

        let captchaCodes = { login: '', reg: '' };
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        // --- KIỂM TRA ĐĂNG NHẬP (AUTH) ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loadingText.innerText = "ĐANG TẢI DỮ LIỆU...";
                try {
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        saveAndGo(docSnap.data(), user.uid);
                    } else {
                        // Khởi tạo data mồi nếu thiếu
                        const fixData = {
                            username: user.email.split('@')[0],
                            phone: "0000000000",
                            fullName: user.displayName || "Thành viên",
                            balance: 0,
                            createdAt: new Date().toISOString(),
                            role: 'user',
                            status: 'active'
                        };
                        await setDoc(docRef, fixData);
                        saveAndGo(fixData, user.uid);
                    }
                } catch (e) {
                    window.toast('error', 'Lỗi kết nối máy chủ!');
                    loadingText.innerText = "MẤT KẾT NỐI MẠNG";
                }
            } else {
                // Fade out hiệu ứng màn hình tải
                loadingOverlay.classList.add('opacity-0');
                setTimeout(() => { loadingOverlay.style.display = 'none'; }, 300);
            }
        });

        function saveAndGo(data, uid) {
            data.uid = uid;
            localStorage.setItem('crownex_user_info', JSON.stringify(data));
            // Đăng nhập thành công -> Chuyển về Kho Game (index.html)
            window.location.href = "index.html";
        }

        // --- SMOOTH TAB LOGIC & CHỈNH CHIỀU CAO ĐỘNG ---
        window.switchTab = (tab) => {
            const loginForm = document.getElementById('formLogin');
            const regForm = document.getElementById('formRegister');
            const indicator = document.getElementById('tabIndicator');
            const btnLogin = document.getElementById('tabLoginBtn');
            const btnReg = document.getElementById('tabRegBtn');
            const wrapper = document.getElementById('formsWrapper');

            if (tab === 'login') {
                indicator.style.transform = 'translateX(0)';
                btnLogin.classList.add('active'); btnReg.classList.remove('active');
                
                loginForm.classList.remove('slide-left', 'slide-right');
                loginForm.classList.add('active');
                
                regForm.classList.remove('active', 'slide-left');
                regForm.classList.add('slide-right');

                wrapper.style.height = '290px'; // Chiều cao form Đăng nhập
                window.drawCaptcha('login');
            } else {
                indicator.style.transform = 'translateX(calc(100% + 8px))';
                btnLogin.classList.remove('active'); btnReg.classList.add('active');

                regForm.classList.remove('slide-right', 'slide-left');
                regForm.classList.add('active');

                loginForm.classList.remove('active', 'slide-right');
                loginForm.classList.add('slide-left');

                wrapper.style.height = '430px'; // Chiều cao form Đăng ký (đủ chỗ cho 5 input)
                window.drawCaptcha('reg');
            }
        };

        // Chiều cao mặc định khi mới vào web
        document.addEventListener('DOMContentLoaded', () => {
             document.getElementById('formsWrapper').style.height = '290px';
        });

        window.togglePass = (id) => {
            const el = document.getElementById(id);
            const icon = el.nextElementSibling.nextElementSibling; // icon con mắt
            if (el.type === 'password') {
                el.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                el.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };

        window.forceLogout = () => {
            signOut(auth).then(() => { localStorage.clear(); location.reload(); });
        };

        // --- SUBMIT LOGIN ---
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const user = document.getElementById('loginUser').value.trim().toLowerCase().replace(/\s/g,'');
            const pass = document.getElementById('loginPass').value;
            const cap = document.getElementById('loginCaptcha').value.toUpperCase();

            if (cap !== captchaCodes.login) {
                window.toast('error', 'Mã xác nhận không chính xác!');
                window.drawCaptcha('login');
                document.getElementById('loginCaptcha').value = '';
                return;
            }

            btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ĐANG KIỂM TRA...`;
            try {
                await signInWithEmailAndPassword(auth, user + EMAIL_PREFIX, pass);
                // OnAuthStateChanged sẽ tự chuyển hướng
            } catch (err) {
                window.toast('error', 'Sai tài khoản hoặc mật khẩu!');
                btn.disabled = false; btn.innerHTML = `TRUY CẬP HỆ THỐNG <i class="fa-solid fa-arrow-right ml-1"></i>`;
                window.drawCaptcha('login');
                document.getElementById('loginCaptcha').value = '';
            }
        });

        // --- SUBMIT REGISTER ---
        document.getElementById('formRegister').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnReg');
            const user = document.getElementById('regUser').value.trim().toLowerCase().replace(/\s/g,'');
            const phone = document.getElementById('regPhone').value.trim();
            const pass = document.getElementById('regPass').value;
            const name = document.getElementById('regName').value.trim();
            const cap = document.getElementById('regCaptcha').value.toUpperCase();

            if (cap !== captchaCodes.reg) {
                window.toast('error', 'Mã xác nhận không chính xác!');
                window.drawCaptcha('reg');
                document.getElementById('regCaptcha').value = '';
                return;
            }

            // Validate Username không có ký tự đặc biệt
            if (!/^[a-zA-Z0-9]+$/.test(user)) {
                window.toast('error', 'Tên đăng nhập không được chứa ký tự đặc biệt!');
                return;
            }

            btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ĐANG TẠO TÀI KHOẢN...`;
            try {
                const cred = await createUserWithEmailAndPassword(auth, user + EMAIL_PREFIX, pass);
                await updateProfile(cred.user, { displayName: name });
                const newData = {
                    username: user, 
                    phone: phone, 
                    fullName: name,
                    balance: 0, 
                    betTurnover: 0,
                    createdAt: new Date().toISOString(), 
                    role: 'user', 
                    status: 'active'
                };
                await setDoc(doc(db, "users", cred.user.uid), newData);
                window.toast('success', 'Đăng ký thành công!');
                // OnAuthStateChanged sẽ tự chuyển hướng
            } catch (err) {
                let msg = 'Lỗi tạo tài khoản!';
                if(err.code.includes('email-already-in-use')) msg = 'Tên đăng nhập này đã có người sử dụng!';
                if(err.code.includes('weak-password')) msg = 'Mật khẩu quá ngắn (Yêu cầu 6 ký tự)!';
                window.toast('error', msg);
                btn.disabled = false; btn.innerHTML = `ĐĂNG KÝ TÀI KHOẢN`;
                window.drawCaptcha('reg');
            }
        });

        // --- UTILS: CAPTCHA & TOAST ---
        window.drawCaptcha = (type) => {
            const canvas = document.getElementById(type === 'login' ? 'canvasLogin' : 'canvasReg');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,canvas.width,canvas.height);
            
            // Vẽ nhiễu nền
            for(let i=0; i<30; i++) {
                ctx.fillStyle = `rgba(252, 213, 53, ${Math.random()*0.3})`;
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*3, 0, Math.PI*2);
                ctx.fill();
            }

            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = ''; for(let i=0; i<4; i++) code += chars[Math.floor(Math.random()*chars.length)];
            captchaCodes[type] = code;

            ctx.font = 'bold 22px IBM Plex Mono';
            ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
            for(let i=0; i<4; i++) {
                ctx.save();
                // Canh giữa 4 chữ số vào canvas width 100
                ctx.translate(20 + i*20, 25);
                ctx.rotate((Math.random()-0.5)*0.6); // Nghiêng chữ
                ctx.fillStyle = '#FCD535';
                ctx.fillText(code[i], 0, 0);
                ctx.restore();
            }
            
            // Vẽ đường gạch chéo gây nhiễu
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, Math.random()*canvas.height); ctx.lineTo(canvas.width, Math.random()*canvas.height); ctx.stroke();
        };

        window.toast = (type, msg) => {
            const box = document.getElementById('toast-box');
            const div = document.createElement('div');
            
            let color, iconClass, bgIcon;
            if(type === 'error') {
                color = 'text-[#F6465D]'; border = 'border-[#F6465D]'; 
                iconClass = 'fa-triangle-exclamation'; bgIcon = 'bg-[#F6465D]/20';
            } else {
                color = 'text-[#0ECB81]'; border = 'border-[#0ECB81]'; 
                iconClass = 'fa-check'; bgIcon = 'bg-[#0ECB81]/20';
            }

            div.className = `toast-msg border ${border}`;
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full ${bgIcon} flex items-center justify-center shrink-0">
                    <i class="fa-solid ${iconClass} ${color} text-sm"></i>
                </div>
                <span class="text-white font-bold text-sm leading-tight">${msg}</span>
            `;
            box.appendChild(div);
            setTimeout(() => { 
                div.style.opacity = '0';
                setTimeout(() => div.remove(), 300);
            }, 2500);
        };

        // Init
        window.drawCaptcha('login');
    </script>
</body>
</html>
