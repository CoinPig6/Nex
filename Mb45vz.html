<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN v17.0 ULTIMATE AUTO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #020617; color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-tab { color: #818cf8 !important; border-bottom: 2px solid #818cf8; }
        .win-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); }
        .loss-glow { box-shadow: 0 0 20px rgba(244, 63, 94, 0.2); border-color: rgba(244, 63, 94, 0.4); }
        @keyframes pulse-indigo { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.98); } }
        .scanning-text { animation: pulse-indigo 2s infinite; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body class="min-h-screen no-scrollbar overflow-x-hidden">

    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[3000] w-[90%] max-w-xs pointer-events-none"></div>

    <!-- HEADER -->
    <header class="sticky top-0 z-50 glass px-5 py-4 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i data-lucide="shield-check" class="w-5 h-5 text-white"></i>
            </div>
            <div>
                <h1 class="text-[13px] font-black uppercase italic tracking-tight leading-none">Titan Ultimate</h1>
                <div class="flex items-center gap-1.5 mt-1">
                    <div id="status-dot" class="status-dot bg-rose-500"></div>
                    <p id="api-status" class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Đang khởi tạo...</p>
                </div>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[8px] font-black text-slate-500 uppercase italic">Lợi nhuận ròng</p>
            <p id="ui-points" class="text-xl font-black italic text-emerald-400 leading-none">0</p>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4 pb-32">
        
        <!-- TOP INDICATORS -->
        <div class="grid grid-cols-3 gap-2">
            <div class="glass p-3 rounded-2xl text-center">
                <p id="ui-timer" class="text-lg font-black text-indigo-400 italic">--s</p>
                <p class="text-[7px] font-black text-slate-500 uppercase mt-0.5">Làm mới</p>
            </div>
            <div class="glass p-3 rounded-2xl text-center">
                <p id="ui-winrate" class="text-lg font-black text-emerald-400 italic">0%</p>
                <p class="text-[7px] font-black text-slate-500 uppercase mt-0.5">Tỉ lệ Win</p>
            </div>
            <div class="glass p-3 rounded-2xl text-center">
                <p id="ui-period" class="text-lg font-black text-white italic">#--</p>
                <p class="text-[7px] font-black text-slate-500 uppercase mt-0.5">Kỳ gần nhất</p>
            </div>
        </div>

        <!-- PREDICTION SECTION -->
        <section class="glass rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl relative">
            <div class="p-4 flex items-center justify-between bg-white/5 border-b border-white/5">
                <div class="flex items-center gap-2">
                    <i data-lucide="cpu" class="w-4 h-4 text-indigo-400"></i>
                    <span class="text-[10px] font-black uppercase italic">Dự đoán kỳ #<span id="ui-next-period" class="text-indigo-400">...</span></span>
                </div>
                
                <!-- MULTIPLIER CONTROLS -->
                <div class="flex items-center gap-2 bg-black/40 px-2 py-1 rounded-xl border border-white/10">
                    <button onclick="TITAN.changeMult(-1)" class="text-slate-400 active:scale-125"><i data-lucide="minus" class="w-3 h-3"></i></button>
                    <span id="ui-mult" class="text-[10px] font-black text-white italic min-w-[25px] text-center">x1</span>
                    <button onclick="TITAN.changeMult(1)" class="text-slate-400 active:scale-125"><i data-lucide="plus" class="w-3 h-3"></i></button>
                </div>
            </div>

            <div class="p-6 text-center">
                <div id="numbers-display" class="text-[14px] font-mono font-black text-slate-200 leading-relaxed tracking-wider min-h-[100px] flex items-center justify-center italic">
                    <div class="flex flex-col items-center gap-3 opacity-50 scanning-text">
                        <i data-lucide="refresh-ccw" class="w-6 h-6 animate-spin"></i>
                        <p class="text-[9px] uppercase tracking-[0.2em]">Đang đồng bộ miba45 API qua Proxy...</p>
                    </div>
                </div>
            </div>

            <div id="result-banner" class="hidden py-2.5 px-4 text-center text-[10px] font-black uppercase italic transition-all"></div>
        </section>

        <!-- TABS AREA -->
        <div class="flex gap-4 border-b border-white/5 px-2">
            <button onclick="TITAN.setTab('results')" id="tab-results-btn" class="pb-2 text-[10px] font-black uppercase italic text-slate-500 active-tab transition-all">Lịch sử kết quả</button>
            <button onclick="TITAN.setTab('logs')" id="tab-logs-btn" class="pb-2 text-[10px] font-black uppercase italic text-slate-500 transition-all">Nhật ký Titan</button>
        </div>

        <div id="tab-results-content" class="space-y-2"></div>
        <div id="tab-logs-content" class="hidden space-y-2"></div>

    </main>

    <!-- FOOTER CONTROLS -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-sm z-50">
        <div class="glass p-3 rounded-3xl flex items-center justify-between border-indigo-500/20 shadow-3xl">
            <div class="flex items-center gap-3 ml-2">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                <p class="text-[9px] font-black uppercase italic tracking-widest text-indigo-400">Auto Scanning</p>
            </div>
            <div class="flex gap-2">
                <button onclick="TITAN.forceSync()" class="p-2.5 bg-white/5 rounded-xl text-slate-400 active:bg-indigo-600 active:text-white transition-all">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
                <button onclick="TITAN.reset()" class="px-5 py-2.5 bg-rose-600/20 text-rose-500 text-[10px] font-black uppercase rounded-xl border border-rose-500/20 active:scale-95">Reset</button>
            </div>
        </div>
    </div>

    <script>
        const TITAN = {
            state: {
                points: 0,
                mult: 1,
                apiResults: [],
                titanLogs: [],
                currentPrediction: [],
                nextPeriod: null,
                lastProcessed: null,
                timer: 45,
                activeTab: 'results',
                isSyncing: false
            },

            // Sử dụng Proxy trung gian để tránh lỗi CORS
            API_URL: 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://hn.vzxskt.top/api/front/open/lottery/history/list/game?limitNum=15&gameCode=miba45'),

            init() {
                this.load();
                this.sync();
                setInterval(() => this.sync(), 6000); // Check API mỗi 6s
                setInterval(() => {
                    if (this.state.timer > 0) this.state.timer--;
                    else this.state.timer = 45;
                    document.getElementById('ui-timer').innerText = this.state.timer + 's';
                }, 1000);
                lucide.createIcons();
            },

            async sync() {
                if (this.state.isSyncing) return;
                this.state.isSyncing = true;
                
                try {
                    const response = await fetch(this.API_URL);
                    const wrapper = await response.json();
                    const json = JSON.parse(wrapper.contents);
                    
                    if (json.code === 200 || json.data) {
                        const data = json.data.map(item => ({
                            period: item.expect,
                            val: parseInt(item.openCode.split(',')[0])
                        }));

                        this.state.apiResults = data;
                        this.updateStatus(true);

                        const latest = data[0];
                        if (!this.state.lastProcessed || latest.period !== this.state.lastProcessed) {
                            this.handleNewPeriod(latest, data);
                        }
                    }
                } catch (err) {
                    this.updateStatus(false);
                } finally {
                    this.state.isSyncing = false;
                    this.render();
                }
            },

            handleNewPeriod(latest, allData) {
                // Kiểm tra kết quả kỳ trước
                if (this.state.nextPeriod && latest.period == this.state.nextPeriod) {
                    const hit = this.state.currentPrediction.includes(latest.val);
                    const profit = hit ? (34 * this.state.mult) : (-65 * this.state.mult);
                    
                    this.state.points += profit;
                    this.state.titanLogs.unshift({
                        period: latest.period,
                        val: latest.val,
                        hit: hit,
                        profit: profit,
                        mult: this.state.mult,
                        prediction: [...this.state.currentPrediction],
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    });

                    this.showBanner(hit, latest.val, profit);
                }

                this.state.lastProcessed = latest.period;
                this.state.nextPeriod = parseInt(latest.period) + 1;
                this.state.timer = 45;

                // Thuật toán 5 lớp
                const historyNums = allData.map(d => d.val).reverse();
                this.state.currentPrediction = this.generatePrediction(historyNums);
                
                this.save();
                this.showToast(`Kỳ mới #${this.state.nextPeriod} đã sẵn sàng`, "success");
            },

            generatePrediction(history) {
                const scores = Array.from({ length: 100 }, (_, i) => ({ n: i, s: Math.random() * 20 }));
                const last10 = history.slice(-10);
                
                scores.forEach(item => {
                    const n = item.n;
                    if (last10.includes(n)) item.s += 60;
                    if (last10.some(x => Math.abs(x - n) === 1)) item.s += 30;
                    if (last10.some(x => Math.abs(x - n) === 10)) item.s += 15;
                });

                return scores.sort((a, b) => b.s - a.s).slice(0, 65).map(i => i.n).sort((a, b) => a - b);
            },

            render() {
                // UI Indicators
                document.getElementById('ui-points').innerText = (this.state.points >= 0 ? '+' : '') + this.state.points;
                document.getElementById('ui-points').className = `text-xl font-black italic ${this.state.points >= 0 ? 'text-emerald-400' : 'text-rose-500'}`;
                
                const wins = this.state.titanLogs.filter(l => l.hit).length;
                const rate = this.state.titanLogs.length > 0 ? ((wins / this.state.titanLogs.length) * 100).toFixed(0) : 0;
                document.getElementById('ui-winrate').innerText = rate + '%';
                document.getElementById('ui-period').innerText = '#' + (this.state.lastProcessed || '--');
                document.getElementById('ui-next-period').innerText = this.state.nextPeriod || '...';
                document.getElementById('ui-mult').innerText = 'x' + this.state.mult;

                // Display Numbers
                if (this.state.currentPrediction.length > 0) {
                    document.getElementById('numbers-display').innerText = this.state.currentPrediction.map(n => String(n).padStart(2, '0')).join(' ');
                }

                this.renderTabs();
                lucide.createIcons();
            },

            renderTabs() {
                const resContent = document.getElementById('tab-results-content');
                const logContent = document.getElementById('tab-logs-content');

                if (this.state.activeTab === 'results') {
                    resContent.classList.remove('hidden');
                    logContent.classList.add('hidden');
                    resContent.innerHTML = this.state.apiResults.map(r => `
                        <div class="glass p-3.5 rounded-2xl flex items-center justify-between border-white/5 shadow-sm">
                            <div class="flex items-center gap-4">
                                <span class="text-[9px] font-black text-slate-500 italic">#${r.period}</span>
                                <div class="w-9 h-9 bg-indigo-500/10 rounded-xl flex items-center justify-center border border-indigo-500/20">
                                    <span class="text-sm font-black text-white italic">${String(r.val).padStart(2, '0')}</span>
                                </div>
                            </div>
                            <p class="text-[8px] font-bold text-slate-600 uppercase italic tracking-tighter">miba45 Server Sync</p>
                        </div>
                    `).join('');
                } else {
                    logContent.classList.remove('hidden');
                    resContent.classList.add('hidden');
                    logContent.innerHTML = this.state.titanLogs.map(log => `
                        <div class="glass p-4 rounded-3xl border-l-4 ${log.hit ? 'border-emerald-500 win-glow' : 'border-rose-500 loss-glow'} space-y-3">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    <span class="text-[10px] font-black text-white italic">Kỳ #${log.period}</span>
                                    <span class="text-[8px] font-black uppercase text-slate-500 tracking-widest">${log.time}</span>
                                </div>
                                <span class="text-xs font-black italic ${log.hit ? 'text-emerald-400' : 'text-rose-500'}">${log.profit >= 0 ? '+' : ''}${log.profit}</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <div class="flex gap-4">
                                    <div><p class="text-[7px] font-bold text-slate-600 uppercase">Kết quả</p><p class="text-sm font-black text-white italic">${String(log.val).padStart(2, '0')}</p></div>
                                    <div><p class="text-[7px] font-bold text-slate-600 uppercase">Hệ số</p><p class="text-sm font-black text-indigo-400 italic">x${log.mult}</p></div>
                                </div>
                                <details class="text-right">
                                    <summary class="text-[8px] font-black text-indigo-400 uppercase cursor-pointer list-none">Chi tiết dàn</summary>
                                    <p class="mt-2 text-[9px] font-mono text-slate-500 italic tracking-tighter max-w-[200px] bg-black/20 p-2 rounded-xl">
                                        ${log.prediction.map(n => `<span class="${n === log.val ? 'text-emerald-400 font-black underline' : ''}">${String(n).padStart(2, '0')}</span>`).join(' ')}
                                    </p>
                                </details>
                            </div>
                        </div>
                    `).join('');
                    if (this.state.titanLogs.length === 0) logContent.innerHTML = '<p class="text-center py-20 opacity-20 text-[10px] uppercase font-black italic">Nhật ký trống</p>';
                }
            },

            updateStatus(ok) {
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('api-status');
                dot.className = `status-dot ${ok ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`;
                text.innerText = ok ? 'API Trực Tuyến (Proxy)' : 'Lỗi kết nối API';
                text.className = `text-[8px] font-bold ${ok ? 'text-emerald-400' : 'text-rose-500'} uppercase mt-1`;
            },

            showBanner(hit, val, profit) {
                const b = document.getElementById('result-banner');
                b.innerText = `Kỳ trước về ${String(val).padStart(2, '0')} -> ${hit ? 'TRÚNG' : 'CHƯA TRÚNG'} (${profit >= 0 ? '+' : ''}${profit})`;
                b.className = `block py-2.5 px-4 text-center text-[10px] font-black uppercase italic ${hit ? 'bg-emerald-600 text-white' : 'bg-rose-600 text-white animate-pulse'}`;
                b.classList.remove('hidden');
                setTimeout(() => b.classList.add('hidden'), 20000);
            },

            changeMult(v) { 
                this.state.mult = Math.max(1, this.state.mult + v); 
                this.render(); 
                this.save(); 
                this.showToast(`Hệ số nhân: x${this.state.mult}`, "info");
            },
            setTab(t) { 
                this.state.activeTab = t; 
                document.getElementById('tab-results-btn').classList.toggle('active-tab', t === 'results');
                document.getElementById('tab-logs-btn').classList.toggle('active-tab', t === 'logs');
                this.render(); 
            },
            showToast(msg, type) {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = `p-3 rounded-xl mb-2 text-[9px] font-black uppercase text-white shadow-2xl animate-in slide-in-from-top-2 ${type === 'success' ? 'bg-emerald-600' : 'bg-indigo-600'}`;
                t.innerText = msg;
                container.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            },
            save() { localStorage.setItem('titan_v17_auto_db', JSON.stringify(this.state)); },
            load() {
                const d = localStorage.getItem('titan_v17_auto_db');
                if (d) {
                    const s = JSON.parse(d);
                    this.state.points = s.points || 0;
                    this.state.mult = s.mult || 1;
                    this.state.titanLogs = s.titanLogs || [];
                    this.state.lastProcessed = s.lastProcessed;
                }
            },
            forceSync() { this.sync(); this.showToast("Đang quét dữ liệu mới...", "info"); },
            reset() { if(confirm("Xóa toàn bộ điểm & lịch sử?")) { localStorage.removeItem('titan_v17_auto_db'); location.reload(); } },
            copyPrediction() {
                const text = this.state.currentPrediction.map(n => String(n).padStart(2, '0')).join(' ');
                const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select();
                document.execCommand('copy'); document.body.removeChild(el);
                this.showToast("Đã chép bộ số kỳ " + this.state.nextPeriod, "success");
            }
        };

        window.onload = () => TITAN.init();
    </script>
</body>
</html>
