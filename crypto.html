<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tpig - Crypto Trading Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS CORE & ANTI-ZOOM */
        html, body { touch-action: pan-y; overscroll-behavior: none; height: 100%; overflow: hidden; background-color: #0b0f19; }
        body { color: #d1d5db; font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; }
        .font-mono { font-family: 'IBM Plex Mono', monospace; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 15px); }
        input, select, textarea, button { font-size: 16px !important; appearance: none; outline: none; -webkit-tap-highlight-color: transparent; }

        /* TECH BORDER & POPUP */
        .tech-border { position: relative; background: #13161f; border: 1px solid #2a2e39; box-shadow: 0 20px 50px rgba(0,0,0,0.9); border-radius: 20px; overflow: hidden; }
        .tech-border.win { border: 1px solid #0ECB81; box-shadow: 0 0 40px rgba(14, 203, 129, 0.2); }
        .tech-border.lose { border: 1px solid #F6465D; box-shadow: 0 0 40px rgba(246, 70, 93, 0.2); }
        
        .btn-trade { transition: all 0.1s; position: relative; overflow: hidden; border-bottom: 4px solid rgba(0,0,0,0.3); }
        .btn-trade:active { transform: translateY(3px); border-bottom-width: 1px; }
        .btn-trade.dimmed { opacity: 0.4; filter: grayscale(1); pointer-events: none; }

        /* HISTORY ROADMAP */
        .history-wrapper { width: 100%; height: 100%; overflow-x: auto; display: flex; align-items: center; padding-left: 5px; scroll-behavior: smooth; }
        .history-container { display: flex; flex-direction: row; gap: 4px; padding-right: 15px; }
        .history-block { display: grid; grid-template-rows: repeat(5, 1fr); grid-template-columns: repeat(4, 1fr); grid-auto-flow: column; gap: 3px; width: 72px; height: 90px; background: rgba(255,255,255,0.02); padding: 5px; border-radius: 8px; border: 1px solid #1f2430; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background-color: #1e232e; margin: auto; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); border: 1px solid #2d3442; transition: all 0.3s; }
        .dot.up { background-color: #0ECB81; box-shadow: 0 0 6px rgba(14, 203, 129, 0.6); border-color: #0ECB81; } 
        .dot.down { background-color: #F6465D; box-shadow: 0 0 6px rgba(246, 70, 93, 0.6); border-color: #F6465D; }
        
        /* ĐƯỜNG KHÓA GIÁ */
        #lockLine { position: absolute; left: 0; right: 0; height: 1px; border-top: 1px dashed #FCD535; z-index: 5; pointer-events: none; display: none; }
        #lockLabel { position: absolute; left: 10px; z-index: 6; background: #FCD535; color: #111; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 900; padding: 3px 8px; border-radius: 6px; transform: translateY(-50%); display: none; box-shadow: 0 4px 10px rgba(252,213,53,0.3); }
        
        /* BẢNG XÁC NHẬN LỆNH */
        #confirmBar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #1e232e; 
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8); z-index: 100;
            transform: translateY(120%); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding-bottom: env(safe-area-inset-bottom, 20px); border-top: 1px solid #2d3442;
        }
        #confirmBar.active { transform: translateY(0); }
        
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .dot.new { animation: popIn 0.3s; border: 2px solid white; box-shadow: 0 0 10px white; }
        
        /* TOAST THÔNG BÁO */
        #toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #1e232e; border: 1px solid #2d3442; padding: 12px 24px; border-radius: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; opacity: 0; transition: all 0.4s; pointer-events: none;}
        #toast.show { opacity: 1; }
        
        /* CHIP CHỌN TIỀN */
        .chip { background: #1e232e; color: #9ca3af; padding: 8px 0; width: 15%; min-width: 45px; text-align: center; border-radius: 8px; font-size: 11px; font-weight: 900; border: 1px solid #2d3442; transition: all 0.2s; }
        .chip.selected { background: #FCD535; color: black; border-color: #FCD535; box-shadow: 0 0 15px rgba(252,213,53,0.5); transform: scale(1.05); }
        .chip:active { transform: scale(0.95); }

        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- MÀN HÌNH TẢI -->
    <div id="pageLoader" class="fixed inset-0 bg-[#0b0f19] z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-14 h-14 bg-gradient-to-br from-[#FCD535] to-[#f59e0b] rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(252,213,53,0.4)] mb-5 animate-bounce">
            <span class="text-black font-black text-2xl italic tracking-widest pl-1">T</span>
        </div>
        <div class="text-[#FCD535] text-[10px] font-mono font-bold tracking-widest uppercase animate-pulse">Đồng bộ biểu đồ...</div>
    </div>

    <!-- TOAST -->
    <div id="toast"><i class="fa-solid fa-circle-check text-[#0ECB81] text-lg"></i><span class="text-xs font-bold text-white uppercase tracking-wide" id="toastMsg">...</span></div>

    <!-- HEADER -->
    <header class="flex items-center justify-between px-4 h-16 bg-[#13161f]/90 backdrop-blur-md border-b border-white/5 z-20 shrink-0">
        <div class="flex items-center gap-4">
            <a href="index.html" class="w-10 h-10 bg-[#1e232e] rounded-xl flex items-center justify-center border border-[#2d3442] active:scale-95 transition-transform shadow-lg">
                <i class="fa-solid fa-arrow-right-from-bracket text-[#9ca3af] rotate-180"></i>
            </a>
            <div class="flex flex-col justify-center">
                <div class="flex items-center gap-2">
                    <span class="text-white font-black text-sm tracking-wide">BTC/USDT</span>
                    <span class="bg-red-500/20 text-red-500 text-[8px] font-black px-1.5 py-0.5 rounded border border-red-500/30 uppercase animate-pulse">Live</span>
                </div>
                <div class="text-[9px] text-[#6b7280] font-mono leading-none mt-1 font-bold">Phiên: <span id="sessionID" class="text-gray-300">...</span></div>
            </div>
        </div>
        <div class="bg-black/30 pl-4 pr-1 py-1 rounded-full border border-white/5 flex items-center gap-3">
            <div class="text-right leading-tight">
                <div class="text-[8px] text-gray-500 font-black uppercase mb-0.5 tracking-widest">SỐ DƯ</div>
                <div id="balanceDisplay" class="text-[#0ECB81] font-mono font-black text-[13px]">--- T</div>
            </div>
            <div class="w-7 h-7 bg-[#FCD535] rounded-full flex items-center justify-center text-xs text-[#111] shadow-lg"><i class="fa-solid fa-wallet"></i></div>
        </div>
    </header>

    <!-- BIỂU ĐỒ NẾN -->
    <div class="flex-1 relative bg-[#050505] overflow-hidden border-b border-white/5" id="chart-wrapper">
        <div class="absolute top-4 right-[70px] z-10">
            <span id="candleStatusBadge" class="text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest bg-blue-500/20 text-blue-400 border border-blue-500/50">CHỜ KẾT QUẢ</span>
        </div>
        <canvas id="chartCanvas" class="w-full h-full block"></canvas>
        <div id="lockLine"></div>
        <div id="lockLabel"><i class="fa-solid fa-lock text-[8px] mr-1 opacity-70"></i> <span id="lockPriceText"></span></div>
        
        <!-- POPUP THẮNG/THUA -->
        <div id="resultPopup" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-50 w-72 text-center transition-all duration-300 scale-90 opacity-0">
            <div id="popupBorder" class="tech-border p-8 relative">
                <div id="popupTitle" class="font-black text-2xl mb-1 uppercase tracking-widest">HÚP RỒI</div>
                <div id="popupAmount" class="font-mono font-black text-3xl drop-shadow-xl">+0 T</div>
            </div>
        </div>
    </div>

    <!-- BẢNG LỊCH SỬ KẾT QUẢ CÓ ĐỒNG HỒ ĐO LỰC -->
    <div class="z-20 shrink-0 h-32 flex flex-col shadow-[0_-5px_30px_rgba(0,0,0,0.8)] bg-[#13161f]">
        <div class="flex items-center justify-between px-5 py-2 border-b border-[#232836] bg-black/40">
            <div class="flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left text-[#FCD535] text-[10px]"></i><span class="text-[#9ca3af] text-[9px] font-black uppercase tracking-wider">Lịch sử kết quả</span></div>
            <div class="flex gap-4 text-[10px] font-black"><span class="text-[#0ECB81]">XANH: <span id="count-up">0</span></span><span class="text-[#F6465D]">ĐỎ: <span id="count-down">0</span></span></div>
        </div>
        <div class="flex-1 bg-[#0b0f19] flex items-center justify-between px-3 overflow-hidden">
            
            <!-- ĐỒNG HỒ LỰC NẾN (Market Force Gauge) -->
            <div class="w-[60px] h-16 relative flex flex-col items-center justify-end shrink-0 border-r border-[#232836] pr-3 mr-2">
                <div class="w-12 h-6 relative overflow-hidden">
                    <svg viewBox="0 0 100 50" class="w-full h-full overflow-visible drop-shadow-md">
                        <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#F6465D" stroke-width="12" stroke-linecap="round"/>
                        <path id="force-arc" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#0ECB81" stroke-width="12" stroke-linecap="round" stroke-dasharray="125.66" stroke-dashoffset="62.83" style="transition: stroke-dashoffset 0.3s ease-out;"/>
                    </svg>
                    <!-- Kim đồng hồ -->
                    <div id="force-needle" class="absolute bottom-0 left-1/2 w-0.5 h-6 bg-white origin-bottom rounded-full shadow-md" style="transform: translateX(-50%) rotate(0deg); transition: transform 0.3s ease-out; z-index: 10;"></div>
                    <div class="absolute bottom-0 left-1/2 w-2 h-2 bg-gray-200 rounded-full transform -translate-x-1/2 translate-y-1/2 z-20 shadow-lg border border-gray-400"></div>
                </div>
                <div class="mt-1.5 flex flex-col items-center leading-none">
                    <div id="force-value" class="text-[8px] font-bold text-[#0ECB81]">50%</div>
                    <div class="text-[7px] font-black text-gray-500 uppercase tracking-widest mt-0.5">Lực Nến</div>
                </div>
            </div>

            <!-- LƯỚI BÓNG LỊCH SỬ -->
            <div class="flex-1 overflow-x-auto hide-scroll h-full flex items-center" id="historyWrapper">
                <div class="history-container" id="historyContainer"></div>
            </div>
        </div>
    </div>

    <!-- BẢNG ĐIỀU KHIỂN & CHIP CƯỢC -->
    <div class="bg-[#13161f] p-4 border-t border-[#232836] pb-safe z-20 shrink-0 relative">
        <div class="flex flex-col items-center w-full max-w-sm mx-auto mb-4">
            
            <!-- CHIPS CHỌN NHANH -->
            <div class="flex items-center justify-between gap-1.5 mb-4 w-full">
                <button onclick="window.setBetAmount(10, this)" class="chip selected">10</button>
                <button onclick="window.setBetAmount(50, this)" class="chip">50</button>
                <button onclick="window.setBetAmount(100, this)" class="chip">100</button>
                <button onclick="window.setBetAmount(500, this)" class="chip">500</button>
                <button onclick="window.setBetAmount(1000, this)" class="chip">1K</button>
                <button onclick="window.setAllIn(this)" class="chip !text-[#FCD535] !border-[#FCD535]">ALL</button>
            </div>

            <!-- Ô NHẬP TIỀN -->
            <div class="flex items-center justify-center gap-3 w-full max-w-sm">
                <button onclick="window.adjustBet(-10)" class="w-12 h-12 bg-[#1e232e] rounded-xl text-[#9ca3af] text-xl font-bold border border-[#2d3442] active:bg-[#2d3442] shadow-sm flex items-center justify-center shrink-0"><i class="fa-solid fa-minus"></i></button>
                
                <div class="flex-1 relative group h-12">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#FCD535] font-black text-base mt-0.5">T</span>
                    <input type="number" id="betInput" value="10" min="10" class="w-full h-full bg-[#050505] border border-[#2d3442] text-white font-mono font-black text-xl rounded-xl text-center focus:outline-none focus:border-[#FCD535] shadow-inner" oninput="window.updateProfit()">
                </div>
                
                <button onclick="window.adjustBet(10)" class="w-12 h-12 bg-[#1e232e] rounded-xl text-[#9ca3af] text-xl font-bold border border-[#2d3442] active:bg-[#2d3442] shadow-sm flex items-center justify-center shrink-0"><i class="fa-solid fa-plus"></i></button>
            </div>
            
            <div class="text-center text-[10px] text-[#6b7280] font-black uppercase mt-2 tracking-widest">Lợi nhuận dự kiến: <span class="text-[#0ECB81]" id="profitDisplay">+9.50 T</span></div>
        </div>
        
        <!-- NÚT MUA/BÁN & ĐẾM NGƯỢC -->
        <div class="flex justify-center items-center gap-3 h-14 w-full max-w-sm mx-auto">
            <!-- NÚT BÁN -->
            <button id="btnSell" onclick="window.selectSide('down')" class="flex-1 h-full btn-trade bg-gradient-to-b from-[#F6465D] to-[#e11d48] rounded-2xl flex items-center justify-between px-4 shadow-lg relative">
                <i class="fa-solid fa-arrow-trend-down text-2xl text-white/30 absolute left-3"></i>
                <div class="flex flex-col items-center w-full z-10 ml-2">
                    <span class="font-black text-xl text-white tracking-wide">BÁN</span>
                </div>
                <div id="badge-down" class="hidden absolute top-1.5 right-1.5 bg-[#FCD535] text-black text-[9px] font-black px-1.5 py-0.5 rounded shadow-lg">0 T</div>
            </button>
            
            <!-- TIMER -->
            <div class="w-20 shrink-0 h-full bg-[#050505] rounded-2xl flex flex-col items-center justify-center border border-[#2d3442] relative overflow-hidden shadow-inner">
                <div id="timerProgress" class="absolute bottom-0 left-0 h-1.5 bg-[#FCD535] w-full transition-all duration-1000 ease-linear"></div>
                <span id="phaseText" class="text-[7px] text-[#6b7280] font-black uppercase z-10 tracking-widest mb-0.5">ĐẶT LỆNH</span>
                <span id="timerText" class="text-white font-mono font-black text-3xl z-10 leading-none">30</span>
            </div>
            
            <!-- NÚT MUA -->
            <button id="btnBuy" onclick="window.selectSide('up')" class="flex-1 h-full btn-trade bg-gradient-to-b from-[#0ECB81] to-[#059669] rounded-2xl flex items-center justify-between px-4 shadow-lg relative">
                <div class="flex flex-col items-center w-full z-10 mr-2">
                    <span class="font-black text-xl text-white tracking-wide">MUA</span>
                </div>
                <i class="fa-solid fa-arrow-trend-up text-2xl text-white/30 absolute right-3"></i>
                <div id="badge-up" class="hidden absolute top-1.5 right-1.5 bg-[#FCD535] text-black text-[9px] font-black px-1.5 py-0.5 rounded shadow-lg">0 T</div>
            </button>
        </div>
    </div>

    <!-- KHUNG XÁC NHẬN LỆNH -->
    <div id="confirmBar" class="p-5 bg-[#13161f] border-t border-white/10">
        <div class="flex justify-between items-center mb-5">
            <div class="flex flex-col">
                <span class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Xác nhận lệnh</span>
                <span id="confirmType" class="text-2xl font-black uppercase mt-0.5">---</span>
            </div>
            <div class="text-right">
                <span class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Số dư ví</span>
                <div id="confirmBalance" class="text-white font-mono font-black text-lg mt-0.5">---</div>
            </div>
        </div>
        
        <div class="bg-black/30 rounded-xl p-4 mb-5 border border-white/5">
            <div class="flex justify-between mb-2.5 items-center">
                <span class="text-gray-400 text-xs font-bold uppercase tracking-wider">Tiền cược</span>
                <span id="confirmAmount" class="text-white font-mono font-black text-base">---</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-gray-400 text-xs font-bold uppercase tracking-wider">Lợi nhuận dự kiến</span>
                <span id="confirmWin" class="text-[#0ECB81] font-mono font-black text-base">---</span>
            </div>
        </div>
        
        <div class="flex gap-3 mb-2">
            <button onclick="window.cancelSelection()" class="flex-1 py-3.5 bg-[#1e232e] rounded-xl text-gray-400 font-black text-xs uppercase tracking-widest border border-[#2d3442] active:scale-95 transition-all">HỦY LỆNH</button>
            <button id="btnConfirm" onclick="window.confirmBet()" class="flex-[2] py-3.5 bg-gradient-to-r from-[#FCD535] to-[#f59e0b] rounded-xl text-black font-black text-sm shadow-xl active:scale-95 transition-all tracking-widest">XÁC NHẬN NGAY</button>
        </div>
    </div>

    <!-- FIREBASE & CORE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, getDoc, onSnapshot, addDoc, collection, setDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let roundSettled = false;

        // --- MATH & SEED LOGIC (ABSOLUTE SYNC 100%) ---
        function seededRandom(seed) {
            let t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }

        // Lấy đúng màu Xanh/Đỏ theo Epoch (Mỗi 30s là 1 mốc)
        function getDeterministicResult(epoch) {
            const currentEpoch = Math.floor(Date.now() / 30000);
            if (epoch === currentEpoch && state.killWhaleMode) {
                if (state.totalUp > state.totalDown) return 'down';
                if (state.totalDown > state.totalUp) return 'up';
            }
            const rand = seededRandom(epoch * 12345 + 6789);
            return rand > 0.5 ? 'up' : 'down';
        }

        // Tạo mảng nến lịch sử
        function buildBaseCandles() {
            const currentEpoch = Math.floor(Date.now() / 30000);
            let simPrice = 98100;
            let cands = [];
            
            for (let e = currentEpoch - 60; e <= currentEpoch; e++) {
                const rand = seededRandom(e * 123);
                const dir = getDeterministicResult(e); 
                
                // Nến chắc chắn đóng đúng hướng của Epoch đó
                let change = dir === 'up' ? (rand * 6 + 2) : -(rand * 6 + 2);
                
                const open = simPrice;
                const close = open + change;
                const high = Math.max(open, close) + seededRandom(e*321) * 3;
                const low = Math.min(open, close) - seededRandom(e*456) * 3;
                
                cands.push({ epoch: e, open, close, high, low, change });
                simPrice = close;
            }
            return cands;
        }

        // --- UI FUNCTIONS ---
        window.setBetAmount = (val, el) => { 
            document.getElementById('betInput').value = val; window.updateProfit(); 
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            if(el) el.classList.add('selected');
        }
        window.setAllIn = (el) => { 
            document.getElementById('betInput').value = Math.floor(state.balance); window.updateProfit(); 
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            if(el) el.classList.add('selected');
        }
        window.adjustBet = (val) => {
            const inp = document.getElementById('betInput');
            let current = parseFloat(inp.value) || 0;
            let nextVal = current + val;
            if (nextVal < 10) nextVal = 10; 
            inp.value = nextVal; window.updateProfit();
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        };
        window.updateProfit = () => {
            const val = parseFloat(document.getElementById('betInput').value) || 0;
            document.getElementById('profitDisplay').innerText = "+" + (val * 0.95).toFixed(2) + " T";
        };

        function showToast(type, msg) {
            const t = document.getElementById('toast'); document.getElementById('toastMsg').innerText = msg;
            t.querySelector('i').className = type === 'error' ? 'fa-solid fa-circle-exclamation text-lg text-[#F6465D]' : 'fa-solid fa-circle-check text-lg text-[#0ECB81]';
            t.style.borderColor = type === 'error' ? '#F6465D' : '#0ECB81';
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.selectSide = (type) => {
            if (new Date().getSeconds() >= 30) return showToast('error', "Hết thời gian đặt lệnh!");
            const isResultPhase = Math.floor(Date.now()/30000) % 2 !== 0;
            if (isResultPhase) return showToast('error', "Vui lòng đợi lệnh tiếp theo!");
            if (state.currentBet && state.currentBet.type !== type) return showToast('error', "Không được cược đối nghịch!");
            
            const amount = parseFloat(document.getElementById('betInput').value);
            if (!amount || amount < 10) return showToast('error', "Mức cược tối thiểu là 10 T!");
            if (amount + state.pendingBet.amount > state.balance) return showToast('error', "Số dư T không đủ!");
            
            state.pendingBet = { type, amount };
            
            const typeEl = document.getElementById('confirmType');
            typeEl.innerText = type === 'up' ? 'MUA (UP)' : 'BÁN (DOWN)';
            typeEl.className = type === 'up' ? 'text-[#0ECB81] font-black uppercase text-xl mt-0.5' : 'text-[#F6465D] font-black uppercase text-xl mt-0.5';
            
            document.getElementById('confirmBalance').innerText = state.balance.toLocaleString('en-US') + " T";
            document.getElementById('confirmAmount').innerText = amount + " T";
            document.getElementById('confirmWin').innerText = "+" + (amount * 0.95).toFixed(2) + " T";
            document.getElementById('confirmBar').classList.add('active');
        };

        window.cancelSelection = () => { state.pendingBet = { type: null, amount: 0 }; document.getElementById('confirmBar').classList.remove('active'); };

        window.confirmBet = async () => {
            if (new Date().getSeconds() >= 30) { window.cancelSelection(); return showToast('error', "Đã hết thời gian cược!"); }
            if (state.isProcessing) return;
            const { amount, type } = state.pendingBet;

            if (amount > state.balance) return showToast('error', "Số dư T không đủ!");
            if (amount < 10) return showToast('error', "Mức cược tối thiểu là 10 T!");

            state.isProcessing = true;
            const btn = document.getElementById('btnConfirm');
            btn.classList.add('btn-loading'); btn.innerText = "ĐANG XỬ LÝ...";

            state.balance -= amount; updateBalanceUI();
            state.pendingBet = { type: null, amount: 0 }; document.getElementById('confirmBar').classList.remove('active');

            if(state.userData.uid && state.userData.uid !== "guest") {
                try {
                    await updateDoc(doc(db, "users", state.userData.uid), { balance: increment(-amount), betTurnover: increment(amount), betToday: increment(amount) }); 
                    await setDoc(doc(db, "games", "current"), { [type === 'up' ? 'totalUp' : 'totalDown']: increment(amount) }, { merge: true });
                } catch(e) {}
            }

            if (!state.currentBet) state.currentBet = { type, amount }; else state.currentBet.amount += amount;

            const now = Date.now();
            localStorage.setItem('crownex_active_bet', JSON.stringify({ type: state.currentBet.type, amount: state.currentBet.amount, expires: now - (now % 60000) + 60000 }));

            updateBetUI(state.currentBet.type, state.currentBet.amount);
            showToast('success', `Đã xác nhận lệnh ${type === 'up' ? 'MUA' : 'BÁN'} thành công!`);
            
            state.isProcessing = false; btn.classList.remove('btn-loading'); btn.innerText = "XÁC NHẬN NGAY";
        };

        function updateBetUI(type, amount) {
            const id = type === 'up' ? 'badge-up' : 'badge-down';
            document.getElementById(id).innerText = amount + " T"; document.getElementById(id).classList.remove('hidden');
            document.getElementById(type === 'up' ? 'btnSell' : 'btnBuy').classList.add('locked');
        }

        function updateBalanceUI() { document.getElementById('balanceDisplay').innerText = state.balance.toLocaleString('en-US', {minimumFractionDigits: 2}) + " T"; }

        const firebaseConfig = {
            apiKey: "AIzaSyAyYO8ZhxVvOImOZveUJULkK8tdcSxo7pU",
            authDomain: "btccoinbig.firebaseapp.com",
            projectId: "btccoinbig",
            storageBucket: "btccoinbig.firebasestorage.app",
            messagingSenderId: "116892525933",
            appId: "1:116892525933:web:04b0da25f3f933ce162664"
        };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);

        const CONFIG = { basePrice: 98100, chartPaddingRight: 80 };
        const state = {
            balance: 0, userData: null, currentBet: null, pendingBet: { type: null, amount: 0 },
            baseCandles: [], visualPrice: 98100, lockPrice: 0, lastEpoch: -1, isProcessing: false, gameStarted: false
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                let userStr = localStorage.getItem('crownex_user_info');
                if (userStr && !user.isAnonymous) {
                    state.userData = JSON.parse(userStr); finishLoading();
                } else if (user.isAnonymous) {
                    state.userData = { uid: "guest", username: "Khách", balance: 1000 }; finishLoading();
                } else {
                    try {
                        const docSnap = await getDoc(doc(db, "users", user.uid));
                        if(docSnap.exists()) {
                            state.userData = docSnap.data(); state.userData.uid = user.uid;
                            localStorage.setItem('crownex_user_info', JSON.stringify(state.userData)); finishLoading();
                        } else { window.location.href = "login.html"; }
                    } catch (e) { state.userData = { uid: "guest", username: "Khách", balance: 1000 }; finishLoading(); }
                }
                if(!user.isAnonymous) {
                    onSnapshot(doc(db, "users", user.uid), (doc) => { if(doc.exists()) { state.balance = doc.data().balance; updateBalanceUI(); } });
                }
            } else { window.location.href = "login.html"; }
        });

        function finishLoading() {
            state.balance = state.userData.balance || 0; updateBalanceUI();
            const loader = document.getElementById('pageLoader'); loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
            if (!state.gameStarted) { initGame(); checkSavedBet(); state.gameStarted = true; }
        }

        function checkSavedBet() {
            const saved = localStorage.getItem('crownex_active_bet');
            if (!saved) return;
            const b = JSON.parse(saved);
            if (b.expires > Date.now()) { state.currentBet = { type: b.type, amount: b.amount }; updateBetUI(b.type, b.amount); }
        }

        // --- HISTORY RENDER (GHI 60 BÓNG TƯƠNG ỨNG 60 EPOCH VỪA QUA) ---
        function regenerateHistory() {
            const currentEpoch = Math.floor(Date.now() / 30000);
            const c = document.getElementById('historyContainer'); c.innerHTML = '';
            let u = 0, dCount = 0;
            
            for (let b = 0; b < 3; b++) {
                const block = document.createElement('div'); block.className = 'history-block';
                for(let i = 0; i < 20; i++) {
                    const slotIdx = b * 20 + i;
                    const epochIdx = currentEpoch - 59 + slotIdx; // Lấy đủ 60 mốc 30s
                    
                    const dot = document.createElement('div');
                    if (slotIdx === 59) {
                        dot.id = 'liveDot'; dot.className = 'dot new'; 
                    } else if (slotIdx < 59) {
                        const res = getDeterministicResult(epochIdx);
                        dot.className = res === 'up' ? 'dot up' : 'dot down';
                        if (res === 'up') u++; else dCount++;
                    }
                    block.appendChild(dot);
                }
                c.appendChild(block);
            }
            document.getElementById('count-up').innerText = u; 
            document.getElementById('count-down').innerText = dCount;
            const wrapper = document.getElementById('historyWrapper'); wrapper.scrollLeft = wrapper.scrollWidth;
        }

        function initGame() {
            resizeCanvas(); window.addEventListener('resize', resizeCanvas);
            state.baseCandles = buildBaseCandles();
            regenerateHistory();
            requestAnimationFrame(gameLoop);
            setInterval(engineTimer, 100); 
        }

        function engineTimer() {
            const now = new Date();
            const s = now.getSeconds(); const ms = now.getMilliseconds();
            const exactSec = s + (ms/1000);
            const isOrder = exactSec < 30;
            const timeLeft = isOrder ? Math.ceil(30 - exactSec) : Math.ceil(60 - exactSec);

            document.getElementById('sessionID').innerText = `${now.getFullYear()}${('0'+(now.getMonth()+1)).slice(-2)}${('0'+now.getDate()).slice(-2)}${('0'+now.getHours()).slice(-2)}${('0'+now.getMinutes()).slice(-2)}`;
            document.getElementById('timerText').innerText = timeLeft < 10 ? "0" + timeLeft : timeLeft;
            document.getElementById('timerProgress').style.width = ((timeLeft / 30) * 100) + "%";
        }

        async function finalizeRound() {
            if (roundSettled) return;
            roundSettled = true;
            
            // Kết quả 100% dựa vào thuật toán Seeded để không ai có thể can thiệp
            const finishedEpoch = Math.floor(Date.now() / 30000) - 1;
            let res = getDeterministicResult(finishedEpoch);

            if (state.currentBet) {
                const b = state.currentBet; const win = (b.type === res);
                let profit = 0; let totalReturn = 0;
                
                if (win) {
                    totalReturn = b.amount * 1.95; profit = b.amount * 0.95;
                    state.balance += totalReturn; showPopup(true, profit);
                } else { showPopup(false, b.amount); }
                
                updateBalanceUI(); localStorage.removeItem('crownex_active_bet');

                if(state.userData.uid !== "guest") {
                    try {
                        const batch = [];
                        if (win) batch.push(updateDoc(doc(db, "users", state.userData.uid), { balance: increment(totalReturn) }));
                        batch.push(addDoc(collection(db, "users", state.userData.uid, "betHistory"), {
                            type: b.type, amount: b.amount, result: win ? 'win' : 'lose', profit: win ? profit : -b.amount, timestamp: serverTimestamp(), sessionId: document.getElementById('sessionID').innerText
                        }));
                        await Promise.all(batch);
                    } catch (e) {}
                }
            }
            setTimeout(() => { roundSettled = false; }, 2000);
        }

        const cvs = document.getElementById('chartCanvas'); const ctx = cvs.getContext('2d');
        function resizeCanvas() { cvs.width = cvs.parentElement.offsetWidth; cvs.height = cvs.parentElement.offsetHeight; }

        function gameLoop() {
            const now = Date.now();
            const currentEpoch = Math.floor(now / 30000);
            const isResultPhase = currentEpoch % 2 !== 0; 
            const progress = (now % 30000) / 30000;

            // 1. Chuyển Phase
            if (state.lastEpoch !== currentEpoch) {
                state.baseCandles = buildBaseCandles();
                state.lastEpoch = currentEpoch;
                
                if (isResultPhase) {
                    state.lockPrice = state.baseCandles[state.baseCandles.length - 1].open;
                    document.getElementById('lockPriceText').innerText = state.lockPrice.toFixed(2);
                    document.getElementById('lockLine').style.display = 'block'; document.getElementById('lockLabel').style.display = 'block';
                    
                    document.getElementById('phaseText').innerText = "CHỜ KẾT QUẢ";
                    document.getElementById('timerProgress').className = "absolute bottom-0 left-0 h-1.5 bg-blue-500 w-full transition-all duration-1000 ease-linear";
                    document.getElementById('candleStatusBadge').innerText = "CHỜ KẾT QUẢ";
                    document.getElementById('candleStatusBadge').className = "text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest bg-blue-500/20 text-blue-400 border border-blue-500/50";
                    document.getElementById('btnBuy').classList.add('dimmed'); document.getElementById('btnSell').classList.add('dimmed');
                    window.cancelSelection();
                } else {
                    document.getElementById('lockLine').style.display = 'none'; document.getElementById('lockLabel').style.display = 'none';
                    
                    document.getElementById('phaseText').innerText = "ĐẶT LỆNH";
                    document.getElementById('timerProgress').className = "absolute bottom-0 left-0 h-1.5 bg-[#FCD535] w-full transition-all duration-1000 ease-linear";
                    document.getElementById('candleStatusBadge').innerText = "MỞ ĐẶT LỆNH";
                    document.getElementById('candleStatusBadge').className = "text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest bg-green-500/20 text-[#0ECB81] border border-green-500/50";
                    document.getElementById('badge-up').classList.add('hidden'); document.getElementById('badge-down').classList.add('hidden');
                    document.getElementById('btnBuy').classList.remove('dimmed', 'locked'); document.getElementById('btnSell').classList.remove('dimmed', 'locked');
                    if(state.userData.uid !== "guest") setDoc(doc(db, "games", "current"), { totalUp: 0, totalDown: 0 }); 
                    state.currentBet = null;
                    
                    finalizeRound(); 
                }
                regenerateHistory(); 
            }

            // 2. Chạy Nến LIVE & Đồng hồ Lực
            const liveCandle = state.baseCandles[state.baseCandles.length - 1];
            const easeProgress = 1 - Math.pow(1 - progress, 2); 
            const tSec = now / 1000;
            
            // --- THUẬT TOÁN "GIẬT ĐIỆN" 3 GIÂY CUỐI ---
            const timeRemaining = 30 * (1 - progress); 
            let currentWiggle = 0;
            if (timeRemaining <= 3.5 && timeRemaining > 0.1) {
                // Random giật cực mạnh nhưng thu hẹp dần về 0
                currentWiggle = (Math.random() - 0.5) * 12 * timeRemaining;
            } else {
                // Rung nhẹ tự nhiên
                currentWiggle = (Math.sin(tSec * 5) * 1 + Math.cos(tSec * 8) * 0.5) * (1 - progress);
            }
            
            // Bắt buộc đích đến bằng Change + Wiggle (Wiggle tự về 0 ở mili giây cuối cùng)
            state.visualPrice = liveCandle.open + (liveCandle.change * easeProgress) + currentWiggle;

            liveCandle.close = state.visualPrice;
            liveCandle.high = Math.max(liveCandle.open, state.visualPrice, liveCandle.high);
            liveCandle.low = Math.min(liveCandle.open, state.visualPrice, liveCandle.low);

            // Đồng hồ lực
            const diff = state.visualPrice - liveCandle.open;
            let forceBase = diff * 15; 
            forceBase += (Math.random() - 0.5) * 10; 
            forceBase = Math.max(-50, Math.min(50, forceBase)); 
            let forcePercent = 50 + forceBase;

            const arc = document.getElementById('force-arc');
            const needle = document.getElementById('force-needle');
            const fVal = document.getElementById('force-value');
            if (arc && needle) {
                arc.style.strokeDashoffset = 125.66 - (forcePercent / 100 * 125.66);
                needle.style.transform = `translateX(-50%) rotate(${-90 + (forcePercent / 100 * 180)}deg)`;
                fVal.innerText = Math.round(forcePercent) + "%";
                fVal.className = forcePercent > 50 ? 'text-[8px] font-bold text-[#0ECB81]' : 'text-[8px] font-bold text-[#F6465D]';
            }

            // Bóng lịch sử đang nháy
            const liveDot = document.getElementById('liveDot');
            if (liveDot) {
                const isLiveUp = state.visualPrice >= liveCandle.open;
                liveDot.className = isLiveUp ? 'dot new up' : 'dot new down';
            }

            // 3. Render Canvas
            const w = (cvs.width - CONFIG.chartPaddingRight) / 30; 
            const r = 80; 
            const min = state.visualPrice - r / 2;
            ctx.clearRect(0, 0, cvs.width, cvs.height);
            
            for(let p = Math.floor(min / 10) * 10; p < min + r; p += 10) {
                const y = cvs.height - ((p - min) / r * cvs.height);
                ctx.strokeStyle = '#1e232e'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cvs.width, y); ctx.stroke();
                ctx.fillStyle = '#4b5563'; ctx.font = '10px IBM Plex Mono'; ctx.fillText(p, cvs.width - 50, y + 4);
            }

            if (isResultPhase) {
                const yl = cvs.height - ((state.lockPrice - min) / r * cvs.height);
                document.getElementById('lockLine').style.top = yl + 'px'; 
                document.getElementById('lockLabel').style.top = yl + 'px';
                ctx.strokeStyle = '#FCD535'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]); 
                ctx.beginPath(); ctx.moveTo(0, yl); ctx.lineTo(cvs.width, yl); ctx.stroke(); ctx.setLineDash([]);
            }

            const lastIdx = state.baseCandles.length - 1;
            for (let i = 0; i <= lastIdx; i++) {
                const dist = lastIdx - i;
                if (dist > 30) continue; 

                const x = (cvs.width - CONFIG.chartPaddingRight) - (dist * w) - (w/2);
                const c = state.baseCandles[i];
                
                const yO = cvs.height - ((c.open - min) / r * cvs.height); 
                const yC = cvs.height - ((c.close - min) / r * cvs.height);
                const yH = cvs.height - ((c.high - min) / r * cvs.height); 
                const yL = cvs.height - ((c.low - min) / r * cvs.height);

                ctx.fillStyle = c.close >= c.open ? '#0ECB81' : '#F6465D'; 
                ctx.strokeStyle = ctx.fillStyle;

                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(x, yH); ctx.lineTo(x, yL); ctx.stroke();
                const bodyH = Math.max(Math.abs(yC - yO), 3);
                ctx.fillRect(x - (w/2) + 2, Math.min(yO, yC), w - 4, bodyH);
            }

            const yc = cvs.height - ((state.visualPrice - min) / r * cvs.height);
            ctx.strokeStyle = '#fff'; ctx.setLineDash([2, 2]); ctx.beginPath(); ctx.moveTo(0, yc); ctx.lineTo(cvs.width, yc); ctx.stroke(); ctx.setLineDash([]);
            
            ctx.fillStyle = state.visualPrice >= liveCandle.open ? '#0ECB81' : '#F6465D';
            ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 5;
            ctx.beginPath(); ctx.roundRect(cvs.width - 60, yc - 12, 60, 24, 4); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff'; ctx.font = 'bold 12px IBM Plex Mono';
            ctx.fillText(state.visualPrice.toFixed(2), cvs.width - 55, yc + 4);
            
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
