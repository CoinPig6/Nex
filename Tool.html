<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DỰ ĐOÁN XSN PRO v5.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <div id="app">
        <!-- Màn hình khởi tạo -->
        <div id="init-screen" class="min-h-screen flex items-center justify-center p-6">
            <div class="w-full max-w-sm space-y-8">
                <div class="text-center space-y-2">
                    <div class="inline-flex p-4 bg-indigo-600 rounded-3xl mb-2 shadow-2xl">
                        <i data-lucide="zap" class="w-10 h-10 fill-white text-white"></i>
                    </div>
                    <h1 class="text-3xl font-black tracking-tight uppercase">Dự Đoán XSN</h1>
                    <p class="text-slate-500 text-[10px] font-bold tracking-[0.2em] uppercase">Quản lý vốn & Xác suất v5.2</p>
                </div>
                <div class="bg-slate-900/50 p-6 rounded-[2.5rem] border border-white/5 space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest ml-1">Lịch sử kỳ trước</label>
                        <textarea id="init-history" class="w-full h-32 bg-black border border-white/10 rounded-2xl p-4 text-lg focus:ring-2 focus:ring-indigo-500 outline-none placeholder:text-slate-800" placeholder="Ví dụ: 01 22 45 78..."></textarea>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest ml-1">Số kỳ bắt đầu</label>
                        <input id="init-period" type="number" class="w-full bg-black border border-white/10 rounded-2xl p-4 font-bold focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="VD: 100">
                    </div>
                    <button onclick="app.init()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all uppercase">Kích Hoạt</button>
                </div>
            </div>
        </div>

        <!-- Màn hình chính -->
        <div id="main-screen" class="hidden pb-24">
            <header class="sticky top-0 z-40 bg-slate-950/90 backdrop-blur-md border-b border-white/5 px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                        <i data-lucide="trending-up" class="w-4 h-4 text-white"></i>
                    </div>
                    <h2 class="text-xs font-black text-white tracking-tight">XSN PRO v5.2</h2>
                </div>
                <div class="text-right">
                    <div class="text-[8px] font-black text-slate-500 uppercase">Tổng Lãi/Lỗ</div>
                    <div id="total-points" class="text-lg font-black leading-none text-emerald-400">0</div>
                </div>
            </header>

            <div id="tab-dashboard" class="p-4 space-y-5 max-w-md mx-auto">
                <!-- Status Row -->
                <div class="flex gap-3">
                    <div class="flex-1 bg-slate-900 border border-white/5 p-4 rounded-2xl">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Kỳ Dự Đoán</p>
                        <p id="display-period" class="text-xl font-black text-white">#1</p>
                    </div>
                    <div class="flex-1 bg-slate-900 border border-white/5 p-4 rounded-2xl">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Hệ Số Nhân</p>
                        <div class="flex items-center justify-between">
                            <button onclick="app.changeMultiplier(-1)" class="w-7 h-7 flex items-center justify-center bg-white/5 rounded-lg active:bg-white/20"><i data-lucide="minus" class="w-3 h-3 text-slate-400"></i></button>
                            <span id="display-multiplier" class="text-xl font-black text-indigo-400">x1</span>
                            <button onclick="app.changeMultiplier(1)" class="w-7 h-7 flex items-center justify-center bg-white/5 rounded-lg active:bg-white/20"><i data-lucide="plus" class="w-3 h-3 text-slate-400"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <section class="bg-slate-900 border border-white/10 rounded-3xl p-5 shadow-xl relative overflow-hidden">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <i data-lucide="zap" class="w-3 h-3 text-amber-400 fill-amber-400"></i> Nhập Kết Quả Kỳ <span id="input-period-label">1</span>
                    </h3>
                    <div class="flex items-stretch gap-2 w-full">
                        <input id="result-input" type="number" class="flex-[2] min-w-0 bg-black border border-white/10 rounded-2xl py-4 text-4xl font-black text-center text-indigo-400 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="00">
                        <button onclick="app.submitResult()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black uppercase text-xs active:scale-90 transition-all">Xác Nhận</button>
                    </div>
                </section>

                <!-- Feedback -->
                <div id="feedback-container"></div>

                <!-- Numbers List -->
                <section class="bg-slate-900 border border-white/5 rounded-[2.5rem] p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <h3 id="pred-title" class="text-xs font-black text-white uppercase">Dàn 65 Số</h3>
                            <div id="lock-badge" class="hidden bg-amber-500/10 text-amber-500 px-2 py-0.5 rounded text-[8px] font-black border border-amber-500/20 flex items-center gap-1">
                                <i data-lucide="lock" class="w-2.5 h-2.5"></i> GIỮ DÀN
                            </div>
                        </div>
                        <button onclick="app.copy()" id="copy-btn" class="flex items-center gap-2 px-4 py-2 bg-white text-black rounded-xl text-xs font-black transition-all active:scale-95">
                            <i data-lucide="copy" class="w-4 h-4"></i> SAO CHÉP
                        </button>
                    </div>
                    <div id="prediction-grid" class="grid grid-cols-5 gap-1.5"></div>
                    <div class="mt-6 pt-4 border-t border-white/5 flex justify-between text-[9px] font-bold text-slate-600 uppercase">
                        <span>Đã tối ưu nhịp số</span>
                        <span class="text-indigo-400">HTML v5.2 FINAL</span>
                    </div>
                </section>
            </div>

            <!-- Tab Thống kê -->
            <div id="tab-history" class="hidden p-4 space-y-3 max-w-md mx-auto">
                <div class="flex items-center justify-between mb-3 px-1">
                    <h3 class="text-sm font-black text-white uppercase tracking-widest">Lịch sử thống kê</h3>
                    <span id="record-count" class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter bg-white/5 px-2 py-1 rounded">0 kỳ</span>
                </div>
                <div id="records-list" class="space-y-3"></div>
            </div>

            <!-- Bottom Nav -->
            <nav class="fixed bottom-0 left-0 w-full bg-slate-950/95 border-t border-white/5 p-3 flex justify-around items-center z-40 backdrop-blur-xl">
                <button onclick="app.switchTab('dashboard')" id="nav-dash" class="flex flex-col items-center gap-1 flex-1 text-indigo-400 scale-110">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="text-[8px] font-black uppercase">Dự Đoán</span>
                </button>
                <button onclick="app.switchTab('history')" id="nav-hist" class="flex flex-col items-center gap-1 flex-1 text-slate-600">
                    <i data-lucide="history" class="w-5 h-5"></i>
                    <span class="text-[8px] font-black uppercase">Thống Kê</span>
                </button>
                <button onclick="app.toggleResetModal(true)" class="flex flex-col items-center gap-1 flex-1 text-slate-700">
                    <i data-lucide="refresh-ccw" class="w-5 h-5"></i>
                    <span class="text-[8px] font-black uppercase">Reset</span>
                </button>
            </nav>
        </div>

        <!-- Custom Modal Reset -->
        <div id="reset-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
            <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
            <div class="relative bg-slate-900 border border-white/10 rounded-[2.5rem] p-8 w-full max-w-xs shadow-2xl text-center space-y-6">
                <div class="w-16 h-16 bg-rose-500/20 rounded-full flex items-center justify-center mx-auto text-rose-500">
                    <i data-lucide="alert-triangle" class="w-10 h-10"></i>
                </div>
                <div class="space-y-2">
                    <h4 class="text-xl font-black text-white uppercase tracking-tight">Xóa Toàn Bộ?</h4>
                    <p class="text-slate-400 text-sm font-medium leading-tight">Mọi lịch sử và điểm số sẽ bị xóa vĩnh viễn.</p>
                </div>
                <div class="flex flex-col gap-3">
                    <button onclick="app.resetSystem()" class="w-full py-4 bg-rose-600 text-white font-black rounded-2xl active:scale-95 transition-all">XÁC NHẬN RESET</button>
                    <button onclick="app.toggleResetModal(false)" class="w-full py-3 bg-white/5 text-slate-400 font-bold rounded-xl">HỦY BỎ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const app = {
            state: {
                isInitialized: false,
                historyNumbers: [],
                records: [],
                currentPrediction: [],
                currentPeriod: 1,
                multiplier: 1,
                totalPoints: 0,
                isLocked: false,
                activeTab: 'dashboard'
            },

            init() {
                const historyInput = document.getElementById('init-history').value;
                const periodInput = document.getElementById('init-period').value;
                
                const raw = historyInput.split(/[^0-9]+/).filter(v => v !== '').map(Number).filter(n => n >= 0 && n <= 99);
                
                if (raw.length < 5) {
                    alert("Hãy nhập ít nhất 5 số kỳ trước.");
                    return;
                }

                this.state.historyNumbers = raw;
                this.state.currentPeriod = parseInt(periodInput) || 1;
                this.state.currentPrediction = this.generatePrediction(raw);
                this.state.isInitialized = true;

                document.getElementById('init-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                this.render();
            },

            generatePrediction(data) {
                const scores = Array.from({ length: 100 }, (_, i) => ({ num: i, score: 0 }));
                
                data.forEach((num, index) => {
                    const weight = (index + 1) / data.length;
                    scores[num].score += 40 * weight;
                });

                const lastNum = data[data.length - 1];
                if (lastNum !== undefined) {
                    [(lastNum - 1 + 100) % 100, (lastNum + 1) % 100].forEach(n => scores[n].score += 15);
                    scores[(lastNum + 50) % 100].score += 12;
                }

                scores.forEach(s => s.score += Math.random() * 10);

                return scores
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 65)
                    .map(s => s.num)
                    .sort((a, b) => a - b);
            },

            submitResult() {
                const inputEl = document.getElementById('result-input');
                const res = parseInt(inputEl.value, 10);
                
                if (isNaN(res) || res < 0 || res > 99) {
                    alert("Vui lòng nhập số từ 00-99");
                    return;
                }

                const isHit = this.state.currentPrediction.includes(res);
                const profit = isHit ? (34 * this.state.multiplier) : (-65 * this.state.multiplier);
                this.state.totalPoints += profit;

                const newRecord = {
                    period: this.state.currentPeriod,
                    result: res,
                    isHit: isHit,
                    profit: profit,
                    multiplier: this.state.multiplier,
                    isLocked: this.state.isLocked,
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                this.state.records.unshift(newRecord);
                this.state.historyNumbers.push(res);

                // Show Feedback
                this.renderFeedback(isHit, profit, res);

                if (isHit) {
                    this.state.isLocked = true;
                } else {
                    this.state.isLocked = false;
                    this.state.currentPrediction = this.generatePrediction(this.state.historyNumbers);
                }

                this.state.currentPeriod++;
                inputEl.value = '';
                this.render();
            },

            renderFeedback(isHit, profit, num) {
                const container = document.getElementById('feedback-container');
                container.innerHTML = `
                    <div class="p-4 rounded-2xl border-2 animate-pulse flex items-center justify-between ${isHit ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-rose-500/10 border-rose-500/30 text-rose-400'}">
                        <div class="flex items-center gap-3">
                            <i data-lucide="${isHit ? 'trophy' : 'x-circle'}" class="w-6 h-6"></i>
                            <div>
                                <div class="text-[9px] font-black uppercase opacity-60">Kỳ trước về: ${num.toString().padStart(2, '0')}</div>
                                <div class="text-base font-black tracking-tight">${isHit ? 'BẠN ĐÃ CHIẾN THẮNG!' : 'CHƯA TRÚNG KỲ NÀY'}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-lg font-black leading-none">${profit > 0 ? '+' + profit : profit}</div>
                            <div class="text-[8px] font-bold uppercase opacity-60 mt-1">Điểm Quỹ</div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            },

            changeMultiplier(val) {
                this.state.multiplier = Math.max(1, Math.min(50, this.state.multiplier + val));
                this.render();
            },

            switchTab(tab) {
                this.state.activeTab = tab;
                if (tab === 'dashboard') {
                    document.getElementById('tab-dashboard').classList.remove('hidden');
                    document.getElementById('tab-history').classList.add('hidden');
                    document.getElementById('nav-dash').className = 'flex flex-col items-center gap-1 flex-1 text-indigo-400 scale-110';
                    document.getElementById('nav-hist').className = 'flex flex-col items-center gap-1 flex-1 text-slate-600';
                } else {
                    document.getElementById('tab-dashboard').classList.add('hidden');
                    document.getElementById('tab-history').classList.remove('hidden');
                    document.getElementById('nav-dash').className = 'flex flex-col items-center gap-1 flex-1 text-slate-600';
                    document.getElementById('nav-hist').className = 'flex flex-col items-center gap-1 flex-1 text-indigo-400 scale-110';
                    this.renderHistory();
                }
            },

            toggleResetModal(show) {
                document.getElementById('reset-modal').classList.toggle('hidden', !show);
            },

            resetSystem() {
                this.state = {
                    isInitialized: false,
                    historyNumbers: [],
                    records: [],
                    currentPrediction: [],
                    currentPeriod: 1,
                    multiplier: 1,
                    totalPoints: 0,
                    isLocked: false,
                    activeTab: 'dashboard'
                };
                document.getElementById('feedback-container').innerHTML = '';
                document.getElementById('init-screen').classList.remove('hidden');
                document.getElementById('main-screen').classList.add('hidden');
                this.toggleResetModal(false);
                lucide.createIcons();
            },

            copy() {
                const text = this.state.currentPrediction.map(n => n.toString().padStart(2, '0')).join(' ');
                const temp = document.createElement('textarea');
                temp.value = text;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                
                const btn = document.getElementById('copy-btn');
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> ĐÃ CHÉP`;
                btn.classList.replace('bg-white', 'bg-emerald-600');
                btn.classList.replace('text-black', 'text-white');
                lucide.createIcons();
                
                setTimeout(() => {
                    btn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i> SAO CHÉP`;
                    btn.classList.replace('bg-emerald-600', 'bg-white');
                    btn.classList.replace('text-white', 'text-black');
                    lucide.createIcons();
                }, 2000);
            },

            render() {
                document.getElementById('total-points').textContent = (this.state.totalPoints > 0 ? '+' : '') + this.state.totalPoints;
                document.getElementById('total-points').className = `text-lg font-black leading-none ${this.state.totalPoints >= 0 ? 'text-emerald-400' : 'text-rose-500'}`;
                document.getElementById('display-period').textContent = '#' + this.state.currentPeriod;
                document.getElementById('input-period-label').textContent = this.state.currentPeriod;
                document.getElementById('display-multiplier').textContent = 'x' + this.state.multiplier;
                document.getElementById('pred-title').textContent = `Dàn 65 Số Kỳ ${this.state.currentPeriod}`;
                document.getElementById('lock-badge').classList.toggle('hidden', !this.state.isLocked);

                const grid = document.getElementById('prediction-grid');
                grid.innerHTML = this.state.currentPrediction.map(num => `
                    <div class="aspect-square flex items-center justify-center bg-black/50 border border-white/5 rounded-xl text-sm font-black text-slate-400">
                        ${num.toString().padStart(2, '0')}
                    </div>
                `).join('');

                lucide.createIcons();
            },

            renderHistory() {
                document.getElementById('record-count').textContent = `${this.state.records.length} kỳ`;
                const list = document.getElementById('records-list');
                list.innerHTML = this.state.records.map(r => `
                    <div class="bg-slate-900 border border-white/5 rounded-[1.5rem] p-4 flex items-center justify-between shadow-lg">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl flex flex-col items-center justify-center font-black ${r.isHit ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'}">
                                <span class="text-[8px] opacity-50 font-bold">KỲ ${r.period}</span>
                                <span class="text-lg leading-none">${r.result.toString().padStart(2, '0')}</span>
                            </div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-black ${r.isHit ? 'text-emerald-400' : 'text-rose-400'}">${r.isHit ? 'THẮNG' : 'THUA'}</span>
                                    <span class="text-[9px] font-bold text-slate-600 uppercase">x${r.multiplier}</span>
                                    ${r.isLocked ? '<i data-lucide="lock" class="w-2.5 h-2.5 text-amber-500 opacity-50"></i>' : ''}
                                </div>
                                <div class="text-[10px] text-slate-600 font-bold uppercase mt-0.5">${r.timestamp}</div>
                            </div>
                        </div>
                        <div class="text-xl font-black ${r.profit >= 0 ? 'text-emerald-400' : 'text-rose-500'}">
                            ${r.profit > 0 ? '+' : ''}${r.profit}
                        </div>
                    </div>
                `).join('');
                if(this.state.records.length === 0) {
                    list.innerHTML = '<div class="py-24 text-center text-slate-700 font-bold uppercase text-[10px]">Trống</div>';
                }
                lucide.createIcons();
            }
        };

        // Initialize Icons
        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
