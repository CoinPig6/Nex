<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>TPIG Support Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        
        :root {
            --bg-color: #0b0f19;
            --card-color: #13161f;
            --gold-primary: #FCD535;
            --gold-dark: #f59e0b;
            --border-color: #232836;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-color); 
            height: 100vh; 
            height: -webkit-fill-available;
            display: flex; 
            flex-direction: column; 
            margin: 0; 
            color: #d1d5db;
            overflow: hidden;
        }

        /* Chống zoom mobile */
        input, textarea, button { font-size: 16px !important; touch-action: manipulation; }

        .chat-bg { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(#1e232e 0.5px, transparent 0.5px); 
            background-size: 15px 15px; 
        }

        .message-bubble { 
            max-width: 85%; 
            word-wrap: break-word; 
            line-height: 1.5; 
            border-radius: 18px; 
            position: relative;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .gold-btn { 
            background: linear-gradient(to right, var(--gold-primary), var(--gold-dark)); 
            color: #000; 
            font-weight: 900; 
        }

        /* Sidebar di động */
        @media (max-width: 768px) {
            .admin-sidebar { 
                width: 100%; 
                position: absolute; 
                inset: 0;
                z-index: 40; 
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            }
            .admin-sidebar.hidden-mobile { transform: translateX(-100%); }
            .chat-main { width: 100%; height: 100%; }
        }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .waiting-badge {
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800;
        }
    </style>
</head>
<body class="fade-in">

    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="login-container" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#0b0f19] p-6">
        <div class="bg-[#13161f] w-full max-w-sm rounded-3xl p-8 shadow-2xl text-center border border-[#232836]">
            <div class="w-20 h-20 bg-gradient-to-br from-[#FCD535] to-[#f59e0b] rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-amber-500/20">
                <span class="text-black text-3xl font-black italic">TP</span>
            </div>
            <h1 class="text-2xl font-black text-[#FCD535] mb-1 tracking-widest uppercase italic">TPIG CENTER</h1>
            <p class="text-gray-500 text-[10px] mb-8 font-bold uppercase tracking-widest">Trung tâm hỗ trợ Gamer</p>
            
            <div class="space-y-4">
                <input type="text" id="login-input" placeholder="Tên tài khoản game..." 
                    class="w-full bg-[#0b0f19] border-2 border-[#2d3442] rounded-2xl py-4 px-6 focus:border-[#FCD535] outline-none transition-all text-white placeholder-gray-600 font-bold">
                
                <button id="btn-login" disabled class="w-full gold-btn py-4 rounded-2xl shadow-lg transition-all transform active:scale-95 uppercase tracking-widest text-sm italic">
                    <span id="login-btn-text">Kết nối...</span>
                </button>

                <a href="game.html" class="block w-full bg-[#1e232e] text-gray-400 font-bold py-4 rounded-2xl transition-all active:scale-95 uppercase tracking-widest text-[10px] border border-[#2d3442]">
                    Quay lại Trang chủ
                </a>
            </div>
        </div>
    </div>

    <!-- GIAO DIỆN NGƯỜI CHƠI (USER) -->
    <div id="user-interface" class="hidden flex flex-col h-full fade-in">
        <header class="bg-[#13161f] border-b border-[#232836] p-4 flex items-center justify-between shrink-0 z-20 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#FCD535] to-[#f59e0b] flex items-center justify-center text-black font-black italic shrink-0 shadow-lg">T</div>
                <div>
                    <h2 class="font-bold text-[#FCD535] text-sm uppercase leading-none mb-1">CSKH TPIG</h2>
                    <div id="queue-status" class="text-[10px] text-gray-500 font-bold uppercase italic tracking-tighter">Đang kết nối...</div>
                </div>
            </div>
            <a href="game.html" class="bg-[#1e232e] text-gray-400 py-2 px-4 rounded-xl border border-[#2d3442] text-[10px] font-bold uppercase">Thoát</a>
        </header>

        <div id="user-messages" class="flex-grow overflow-y-auto p-4 space-y-4 chat-bg hide-scroll"></div>

        <div class="p-4 bg-[#13161f] border-t border-[#232836] shrink-0">
            <div class="flex items-center gap-2 bg-[#0b0f19] p-2 rounded-2xl border border-[#2d3442] shadow-inner">
                <input type="text" id="user-msg-input" placeholder="Nhập nội dung cần hỗ trợ..." class="flex-grow bg-transparent border-none px-3 py-2 text-base outline-none text-white placeholder-gray-600 font-medium">
                <button id="btn-send-user" class="gold-btn p-3 rounded-xl shadow-lg">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- GIAO DIỆN CSKH (ADMIN) -->
    <div id="admin-interface" class="hidden flex h-full overflow-hidden bg-[#0b0f19] fade-in relative">
        <!-- Sidebar -->
        <div id="admin-sidebar" class="admin-sidebar md:w-80 border-r border-[#232836] flex flex-col bg-[#13161f] shrink-0">
            <div class="p-4 border-b border-[#232836] flex justify-between items-center bg-[#13161f]">
                <div class="flex items-center gap-2">
                    <h3 class="font-black text-[#FCD535] text-[10px] uppercase tracking-widest">KHÁCH ĐANG ĐỢI</h3>
                    <span id="waiting-count" class="waiting-badge">0</span>
                </div>
                <button id="btn-refresh-admin" class="text-gray-500 hover:text-white"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
            <div id="admin-user-list" class="flex-grow overflow-y-auto hide-scroll"></div>
        </div>

        <!-- Khung Chat Admin -->
        <div class="chat-main flex-grow flex flex-col relative bg-[#0b0f19]">
            <div id="admin-chat-header" class="p-4 border-b border-[#232836] flex justify-between items-center shrink-0 min-h-[73px] bg-[#13161f]">
                <div class="flex items-center gap-3 overflow-hidden">
                    <button id="btn-back-to-list" class="md:hidden text-[#FCD535] mr-1 text-lg"><i class="fa-solid fa-chevron-left"></i></button>
                    <div id="active-user-avatar" class="w-9 h-9 rounded-full bg-[#1e232e] flex items-center justify-center font-black text-[#FCD535] hidden border border-[#2d3442] shrink-0">?</div>
                    <div class="font-black text-gray-300 text-sm uppercase italic tracking-tighter truncate" id="header-user-name">QUẢN LÝ CSKH</div>
                </div>
                <button id="btn-end-session" class="hidden bg-red-600/90 hover:bg-red-700 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase transition-all shadow-lg shrink-0">Kết thúc</button>
            </div>
            
            <div id="quick-chat-bar" class="bg-[#13161f] p-2 border-b border-[#232836] flex gap-2 overflow-x-auto hide-scroll hidden">
                <button class="quick-chat-btn" data-txt="Chào bạn! CSKH TPIG đã có mặt, tôi có thể hỗ trợ gì cho bạn?">CHÀO HỎI</button>
                <button class="quick-chat-btn" data-txt="Vui lòng cung cấp chính xác Tên tài khoản Game của bạn để mình kiểm tra.">HỎI TÊN TK</button>
                <button class="quick-chat-btn" data-txt="Vấn đề của bạn đã được chuyển cho bộ phận kỹ thuật, vui lòng chờ nhé.">BÁO LỖI</button>
                <button class="quick-chat-btn" data-txt="Yêu cầu của bạn đã được hoàn tất. Chúc bạn chơi game vui vẻ nhé!">XONG</button>
                <button class="quick-chat-btn" data-txt="Cảm ơn bạn đã liên hệ. Phiên hỗ trợ xin kết thúc tại đây!">TẠM BIỆT</button>
            </div>

            <div id="admin-messages" class="flex-grow overflow-y-auto p-4 space-y-4 chat-bg hide-scroll">
                <div class="flex flex-col items-center justify-center h-full text-gray-700 opacity-50 text-center px-10">
                    <i class="fa-solid fa-comments text-5xl mb-4"></i>
                    <p class="text-[10px] font-black uppercase tracking-widest">Chọn khách hàng để bắt đầu chat</p>
                </div>
            </div>

            <div id="admin-input-container" class="p-4 bg-[#13161f] border-t border-[#232836] hidden shrink-0">
                <div class="flex items-center gap-2 bg-[#0b0f19] p-2 rounded-2xl border border-[#2d3442] shadow-inner">
                    <input type="text" id="admin-msg-input" placeholder="Phản hồi khách..." class="flex-grow bg-transparent border-none px-3 py-2 text-base outline-none text-white font-medium">
                    <button id="btn-send-admin" class="gold-btn px-6 py-2 rounded-xl text-sm italic font-black uppercase shadow-lg">GỬI</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Xác nhận -->
    <div id="custom-modal" class="fixed inset-0 z-[200] flex items-center justify-center bg-black/90 hidden p-6 backdrop-blur-sm">
        <div class="bg-[#13161f] border border-[#2d3442] p-8 rounded-3xl max-w-xs w-full text-center shadow-2xl">
            <p id="modal-text" class="text-white mb-8 text-sm font-bold leading-relaxed uppercase tracking-tight"></p>
            <div class="flex gap-3 justify-center">
                <button id="modal-cancel" class="bg-[#1e232e] text-gray-400 flex-1 py-3 rounded-2xl text-[10px] font-black uppercase">Hủy</button>
                <button id="modal-confirm" class="bg-[#F6465D] text-white flex-1 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg">Xác nhận</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, deleteDoc, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG CỦA BẠN
        const firebaseConfig = {
            apiKey: "AIzaSyAyYO8ZhxVvOImOZveUJULkK8tdcSxo7pU",
            authDomain: "btccoinbig.firebaseapp.com",
            projectId: "btccoinbig",
            storageBucket: "btccoinbig.firebasestorage.app",
            messagingSenderId: "116892525933",
            appId: "1:116892525933:web:04b0da25f3f933ce162664",
            measurementId: "G-7Q1GBFNQ37"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // Đường dẫn tuân thủ Rules Section 10
        const HUB_PATH = `artifacts/tpig_support/public/data/chats`;

        let fbUser = null;
        let isAdminActive = false;
        let selectedUserId = null;
        let myNickName = "";
        let hasRepliedOnce = false;
        let msgListener = null;

        // AUTH
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                fbUser = u;
                document.getElementById('btn-login').disabled = false;
                document.getElementById('login-btn-text').innerText = 'BẮT ĐẦU CHAT';
            } else {
                signInAnonymously(auth).catch(e => console.error("Auth Fail", e));
            }
        });

        // MODAL HELPER
        const showModal = (text, confirmCb) => {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-text').innerText = text;
            modal.classList.remove('hidden');
            document.getElementById('modal-confirm').onclick = () => { modal.classList.add('hidden'); confirmCb(); };
            document.getElementById('modal-cancel').onclick = () => { modal.classList.add('hidden'); };
        };

        // LOGIN
        document.getElementById('btn-login').onclick = () => {
            const val = document.getElementById('login-input').value.trim();
            if (!val || !fbUser) return;

            if (val === "cskhtpig123") {
                isAdminActive = true;
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('admin-interface').classList.remove('hidden');
                initAdminSystem();
            } else {
                isAdminActive = false;
                myNickName = val;
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('user-interface').classList.remove('hidden');
                initUserSystem();
            }
        };

        // --- NGƯỜI CHƠI ---
        function initUserSystem() {
            const userDocRef = doc(db, HUB_PATH, fbUser.uid);
            setDoc(userDocRef, { name: myNickName, created: serverTimestamp(), agentJoined: false, active: true }, { merge: true });

            // Theo dõi hàng chờ và trạng thái kết nối
            onSnapshot(collection(db, HUB_PATH), (snap) => {
                const waitingList = [];
                snap.forEach(d => {
                    const data = d.data();
                    if (data.created && !data.agentJoined) {
                        waitingList.push({ id: d.id, time: data.created.toMillis ? data.created.toMillis() : Date.now() });
                    }
                });
                waitingList.sort((a,b) => a.time - b.time);
                const rank = waitingList.findIndex(u => u.id === fbUser.uid) + 1;
                
                getDoc(userDocRef).then(ds => {
                    const status = document.getElementById('queue-status');
                    if (ds.exists() && ds.data().agentJoined) {
                        status.innerHTML = `<span class="text-[#0ECB81] font-bold">● ĐANG TRÒ CHUYỆN TRỰC TIẾP</span>`;
                    } else {
                        status.innerText = rank > 0 ? `VỊ TRÍ HÀNG CHỜ: ${rank}` : "ĐANG KẾT NỐI...";
                    }
                });
            });

            // Theo dõi tin nhắn
            const qMsg = query(collection(db, HUB_PATH, fbUser.uid, 'messages'), orderBy('time', 'asc'));
            onSnapshot(qMsg, (snap) => {
                const box = document.getElementById('user-messages');
                // Nếu bị CSKH đóng phiên (Dữ liệu bị xóa)
                if (snap.empty && hasRepliedOnce) { location.reload(); return; }
                box.innerHTML = '';
                snap.forEach(d => renderBubble(box, d.data().text, d.data().role === 'admin' ? 'left' : 'right'));
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- CSKH (ADMIN) ---
        function initAdminSystem() {
            onSnapshot(collection(db, HUB_PATH), (snap) => {
                const listEl = document.getElementById('admin-user-list');
                const waitingCountEl = document.getElementById('waiting-count');
                listEl.innerHTML = '';
                
                const allUsers = [];
                let waitingCount = 0;
                
                snap.forEach(d => {
                    const data = d.data();
                    if (data.name) {
                        allUsers.push({ id: d.id, ...data });
                        if (!data.agentJoined) waitingCount++;
                    }
                });
                
                waitingCountEl.innerText = waitingCount;
                
                // Ưu tiên người chưa được tiếp nhận lên đầu
                allUsers.sort((a,b) => (a.agentJoined === b.agentJoined) ? 0 : a.agentJoined ? 1 : -1);

                allUsers.forEach(data => {
                    const item = document.createElement('div');
                    item.className = `p-4 border-b border-[#232836] cursor-pointer transition-all ${selectedUserId === data.id ? 'admin-item-active' : 'hover:bg-[#13161f]'}`;
                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="relative shrink-0">
                                <div class="w-10 h-10 rounded-full bg-[#1e232e] text-[#FCD535] flex items-center justify-center font-black border border-[#2d3442] text-xs">${data.name.charAt(0).toUpperCase()}</div>
                                ${!data.agentJoined ? '<div class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-[#0b0f19] animate-pulse"></div>' : ''}
                            </div>
                            <div class="flex-grow overflow-hidden leading-tight">
                                <p class="font-black text-[11px] text-gray-200 truncate uppercase tracking-tight">${data.name}</p>
                                <p class="text-[8px] ${data.agentJoined ? 'text-gray-500 font-bold' : 'text-[#FCD535] font-black'} uppercase mt-1 tracking-tighter">
                                    ${data.agentJoined ? 'Đã tiếp nhận' : 'CHỜ HỖ TRỢ'}
                                </p>
                            </div>
                        </div>`;
                    item.onclick = () => selectUser(data.id, data.name, data.agentJoined);
                    listEl.appendChild(item);
                });
            });
        }

        async function selectUser(uid, name, alreadyJoined) {
            selectedUserId = uid;
            
            // Xử lý di động: ẩn danh sách để chat
            if (window.innerWidth <= 768) {
                document.getElementById('admin-sidebar').classList.add('hidden-mobile');
            }

            document.getElementById('header-user-name').innerText = name.toUpperCase();
            document.getElementById('active-user-avatar').innerText = name.charAt(0).toUpperCase();
            document.getElementById('active-user-avatar').classList.remove('hidden');
            document.getElementById('admin-input-container').classList.remove('hidden');
            document.getElementById('btn-end-session').classList.remove('hidden');
            document.getElementById('quick-chat-bar').classList.remove('hidden');
            
            const userRef = doc(db, HUB_PATH, uid);
            const msgCol = collection(db, HUB_PATH, uid, 'messages');

            if (!alreadyJoined) {
                await updateDoc(userRef, { agentJoined: true });
                await addDoc(msgCol, { text: "Xin chào! CSKH TPIG đã tiếp nhận yêu cầu. Tôi có thể hỗ trợ gì cho bạn ạ?", role: 'admin', time: serverTimestamp() });
            }

            if (msgListener) msgListener(); // Gỡ lắng nghe cũ

            const qMsg = query(msgCol, orderBy('time', 'asc'));
            msgListener = onSnapshot(qMsg, (snap) => {
                const box = document.getElementById('admin-messages');
                box.innerHTML = '';
                snap.forEach(d => renderBubble(box, d.data().text, d.data().role === 'admin' ? 'right' : 'left'));
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- GỬI TIN ---
        const sendMsg = async (role, customTxt = null) => {
            const input = document.getElementById(role === 'admin' ? 'admin-msg-input' : 'user-msg-input');
            const text = customTxt || input.value.trim();
            if (!text || !fbUser) return;
            const targetId = role === 'admin' ? selectedUserId : fbUser.uid;
            
            try {
                const msgCol = collection(db, HUB_PATH, targetId, 'messages');
                const chatDoc = doc(db, HUB_PATH, targetId);
                
                await addDoc(msgCol, { text, role, time: serverTimestamp() });
                await updateDoc(chatDoc, { lastMsg: text, lastUpdate: serverTimestamp() });

                if (role === 'user' && !hasRepliedOnce) {
                    const ds = await getDoc(chatDoc);
                    if (!ds.data()?.agentJoined) {
                        hasRepliedOnce = true;
                        setTimeout(async () => {
                            const botMsg = `Chào bạn! Hệ thống đã ghi nhận yêu cầu. Bạn vui lòng cung cấp Tên tài khoản Game và mô tả vấn đề gặp phải, chuyên viên sẽ phản hồi bạn ngay lập tức.`;
                            await addDoc(msgCol, { text: botMsg, role: 'admin', time: serverTimestamp() });
                        }, 1200);
                    }
                }
                if (!customTxt) input.value = '';
            } catch (e) { console.error(e); }
        };

        // UI Handlers
        document.getElementById('btn-send-user').onclick = () => sendMsg('user');
        document.getElementById('btn-send-admin').onclick = () => sendMsg('admin');
        document.querySelectorAll('.quick-chat-btn').forEach(b => {
            b.onclick = () => sendMsg('admin', b.getAttribute('data-txt'));
        });

        document.getElementById('btn-back-to-list').onclick = () => {
            document.getElementById('admin-sidebar').classList.remove('hidden-mobile');
        };

        document.getElementById('btn-refresh-admin').onclick = () => location.reload();

        // KẾT THÚC PHIÊN (XÓA DATA & RESET UI)
        document.getElementById('btn-end-session').onclick = () => {
            showModal("BẠN MUỐN ĐÓNG PHIÊN VÀ XÓA DỮ LIỆU CHAT NÀY?", async () => {
                const targetId = selectedUserId;
                const col = collection(db, HUB_PATH, targetId, 'messages');
                
                // Reset UI Admin ngay lập tức (Xóa bóng ma dữ liệu)
                selectedUserId = null;
                document.getElementById('admin-messages').innerHTML = '<div class="flex flex-col items-center justify-center h-full text-gray-700 opacity-50 text-center px-10"><i class="fa-solid fa-check-circle text-5xl mb-4 text-green-500"></i><p class="text-[10px] font-black uppercase tracking-widest">Đã đóng phiên hỗ trợ thành công</p></div>';
                document.getElementById('admin-input-container').classList.add('hidden');
                document.getElementById('btn-end-session').classList.add('hidden');
                document.getElementById('quick-chat-bar').classList.add('hidden');
                document.getElementById('active-user-avatar').classList.add('hidden');
                document.getElementById('header-user-name').innerText = "Quản lý phiên hỗ trợ";
                if (msgListener) msgListener();
                
                if (window.innerWidth <= 768) {
                    document.getElementById('admin-sidebar').classList.remove('hidden-mobile');
                }

                // Thực hiện xóa dữ liệu thật trên Firebase
                const snap = await getDocs(col);
                const promises = snap.docs.map(d => deleteDoc(d.ref));
                await Promise.all(promises);
                await deleteDoc(doc(db, HUB_PATH, targetId));
            });
        };

        function renderBubble(box, text, side) {
            const div = document.createElement('div');
            div.className = `flex ${side === 'right' ? 'justify-end' : 'justify-start'} fade-in`;
            const color = side === 'right' ? 'bg-[#FCD535] text-black font-black rounded-tr-none' : 'bg-[#1e232e] text-gray-200 border border-[#2d3442] rounded-tl-none';
            div.innerHTML = `<div class="${color} message-bubble px-4 py-2.5 shadow-lg text-[13px] tracking-tight font-medium">${text}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('user-interface').classList.contains('hidden')) sendMsg('user');
                if (!document.getElementById('admin-interface').classList.contains('hidden')) sendMsg('admin');
            }
        });
    </script>
</body>
</html>
